<style>
:root { --bg: #f4f4f9; --text: #121212; --brand-card: #fff; --brand-card-hover: #c0dafd; --table-header: #003366; --table-header-text: #fff; --model-hover: #e0f0ff; --selected-model: #c0dafd; --breadcrumb-bg: #e9ecef; --breadcrumb: #003366; --box-shadow: 0 0 8px rgba(0,0,0,0.05); --border: #dee2e6; --test: #888888; --text-btn: #6c757d; }
body[data-bs-theme="dark"] {--toggle-bg: #212529; --bg: #212529; --text: #dee2e6; --brand-card: #181818; --brand-card-hover: #334460; --table-header: #52789b; --table-header-text: #eaf1ff; --model-hover: #25344a; --selected-model: #38507c; --breadcrumb-bg: #495057; --breadcrumb: #c7d7ef; --box-shadow: 0 0 8px rgba(0,0,0,0.18); --border: #495057; --test: #ccc; }
body { font-family: Arial, sans-serif; margin: 1rem; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
.container { display: flex; gap: 2rem; }
.brand-card { background: var(--brand-card); border-radius: 8px; padding: 1rem; width: 120px; box-shadow: 0 2px 6px rgb(0 0 0 / 0.1); cursor: pointer; text-align: center; transition: background-color 0.25s, box-shadow 0.25s; border: 1px solid var(--border); }
.brand-card:hover { background: var(--brand-card-hover); box-shadow: 0 4px 12px rgb(0 0 0 / 0.15); }
.brand-card.selected { background: var(--selected-model) !important; font-weight: bold; border: 2px solid var(--table-header); }
.brand-logo { width: 50px; height: 50px; margin-bottom: 0.5rem; object-fit: contain; }
body[data-bs-theme="dark"] .brand-logo.invert-in-dark { filter: invert(1) brightness(1.08); }
.brand-code, .brand-name { opacity: 1 !important; font-weight: 700; font-size: 1.1rem; transition: none !important; }
.brand-code, .brand-name { color: #26334d; }
body[data-bs-theme="dark"] .brand-code, body[data-bs-theme="dark"] .brand-name { color: var(--text); }
.brand-name { font-weight: 100; font-size: 0.9rem; }
.back-btn, #settings-toggle { display: inline-block; padding: 0.6rem 1.4rem; font-size: 1.14rem; font-weight: 600; color: var(--text-btn); background: none; border: 1.5px solid var(--border, #444); border-radius: 8px; text-decoration: none; transition: background 0.18s, color 0.18s, border 0.18s; margin-right: 0.5rem; letter-spacing: 0.01em; }
.back-btn:hover, .back-btn:focus, #settings-toggle:hover { color: #007bff; border-color: #007bff; text-decoration: none; }
#settings-toggle { padding: 0; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; } /* Style settings button */
#brands-container, #models-container { flex: 1; background: var(--brand-card); padding: 1rem; border-radius: 6px; box-shadow: var(--box-shadow); border: 1px solid var(--border); }
#models-container { flex: 2; max-height: 500px; overflow-y: auto; }
#brands-list-scroll { max-height: 70vh; overflow-y: auto; padding-right: 4px; }
h2 { margin-top: 0; margin-bottom: 1rem; border-bottom: 2px solid var(--table-header); padding-bottom: 0.3rem; color: var(--text); }
#brands-list { display: flex; gap: 1rem; flex-wrap: wrap; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); cursor: pointer; }
th { background-color: var(--table-header); color: var(--table-header-text); font-weight: bold; position: sticky; top: 0; z-index: 2; }
tbody tr:hover { background-color: var(--model-hover); }
.selected-model { background-color: var(--selected-model) !important; font-weight: bold; }
.breadcrumb { display: flex; flex-wrap: wrap; padding: 0.5rem 1rem; list-style: none; background-color: var(--breadcrumb-bg); border-radius: 0.25rem; font-size: 0.9rem; color: var(--breadcrumb); }
.breadcrumb-item + .breadcrumb-item::before { content: "›"; padding: 0 0.5rem; color: #6c757d; }
.breadcrumb-item a { color: var(--breadcrumb); text-decoration: none; cursor: pointer; }
.breadcrumb-item a:hover { text-decoration: underline; }

.breadcrumb-item.active { font-weight: 600; }
@media (max-width: 700px) { /* Other media queries unchanged */ }
body[data-bs-theme="dark"] ::-webkit-scrollbar { width: 12px; background: #23272e; }
body[data-bs-theme="dark"] ::-webkit-scrollbar-thumb { background: #3d434e; border-radius: 8px; border: 2px solid #23272e; }
body[data-bs-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: #596080; }
body[data-bs-theme="dark"] ::-webkit-scrollbar-corner { background: #23272e; }
body[data-bs-theme="dark"] { scrollbar-color: #3d434e #23272e; scrollbar-width: thin; }
.epc-main-content {
  display: flex;
  gap: 1rem;
  padding: 0 1.5rem 1.5rem 1.5rem;
  flex-grow: 1;
  min-height: 0;
  box-sizing: border-box;
  width: 100%;      /* ensures it fills the viewport width */
  max-width: 100%;  /* removes Bootstrap's max-width */
  margin: 0;         /* removes centering */
}
@media (max-width: 900px) {
  .epc-main-content {
    flex-direction: column;
    gap: 0.6rem;
    padding: 0.5rem !important;
  }
  #brands-container, #models-container {
    min-width: 0;

    max-width: 100% !important;
    box-sizing: border-box;
    padding: 0.8rem 0.5rem;
  }
  #brands-list-scroll {
    overflow-x: auto;
    overflow-y: visible;
    width: 100%;
    padding-bottom: 0.5rem;
  }
  #brands-list {
    display: flex;
    flex-direction: row;
    gap: 0.7rem;
    flex-wrap: nowrap;
    min-width: max-content;
  }
  .brand-card {
    min-width: 110px;
    width: 110px;
    flex-shrink: 0;
    margin-bottom: 0;
  }
  #models-table {
    font-size: 1rem;
  }
  .breadcrumb {
    font-size: 0.98rem;
  }
  h2 {
    font-size: 1.08rem;
    margin-bottom: 0.5rem;
  }
}
@media (max-width: 600px) {
  body {
    font-size: 0.96rem;

  }
  .back-btn, #settings-toggle, #theme-toggle {
    font-size: 0.93rem;
    padding: 0.22rem 0.4rem;
  }
}

<script>
document.addEventListener('DOMContentLoaded', () => {

  // --- ROBUST DATA READING FUNCTION ---
  async function readDataJson(relPath) {
    const isElectron = () => navigator.userAgent.toLowerCase().indexOf(' electron/') > -1;
    const getRootPath = () => window.location.pathname.includes('/epc/') ? '../' : './';

    if (isElectron() && window.api && typeof window.api.readDataFile === 'function') {
      try {
        const content = await window.api.readDataFile(relPath);
        return JSON.parse(content);
      } catch (error) {
        console.error(`Electron: Local file read failed for ${relPath}.`, error);
        throw new Error(`Local file not found: ${relPath}`);
      }
    } else {
      try {
          const response = await fetch(getRootPath() + relPath);
          if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status} for ${relPath}`);
          }
          return await response.json();
      } catch (error) {
          console.error(`Web: Could not fetch file ${relPath}.`, error);
          throw new Error(`Failed to fetch from web host: ${relPath}`);
      }
    }
  }

  // --- UNIVERSAL THEME LOGIC ---
  function setTheme(theme) { document.body.setAttribute('data-bs-theme', theme); localStorage.setItem('theme', theme); updateThemeIcon(); }
  function updateThemeIcon() {
    document.querySelectorAll('#theme-toggle').forEach(btn => {
      const moon = btn.querySelector('.moon-icon'); const sun = btn.querySelector('.sun-icon'); if (!moon || !sun) return;
      if (document.body.getAttribute('data-bs-theme') === 'dark') { sun.style.display = 'none'; moon.style.display = ''; } else { sun.style.display = ''; moon.style.display = 'none'; }
    });
  }

  // --- PAGE-SPECIFIC LOGIC ---
  function initializeEpcPage() {
    const brandsList = document.getElementById('brands-list');
    const modelsTableBody = document.querySelector('#models-table tbody');
    const breadcrumbEl = document.getElementById('breadcrumb');
    let selectedBrandCard = null;
    let allBrandsList = [];
    let localContentData;
    const isElectronMode = navigator.userAgent.toLowerCase().indexOf(' electron/') > -1;

    if (isElectronMode) {
        document.querySelectorAll('.electron-only').forEach(btn => btn.style.display = 'flex');
    }

    function renderBreadcrumb(selectedBrandCode, selectedBrandName) {
        breadcrumbEl.innerHTML = '';
        const liHome = document.createElement('li');
        liHome.className = 'breadcrumb-item';
        const aHome = document.createElement('a');
        aHome.textContent = 'EPC'; aHome.href = '#';
        aHome.onclick = e => { e.preventDefault(); clearBrandSelection(); };
        liHome.appendChild(aHome);
        breadcrumbEl.appendChild(liHome);
        if (selectedBrandCode && selectedBrandName) {
            const liBrand = document.createElement('li');
            liBrand.className = 'breadcrumb-item active';
            liBrand.setAttribute('aria-current', 'page');
            liBrand.textContent = `${selectedBrandName}`;
            breadcrumbEl.appendChild(liBrand);
        }
    }

    function clearBrandSelection() {
        if (selectedBrandCard) { selectedBrandCard.classList.remove('selected'); selectedBrandCard = null; }
        modelsTableBody.innerHTML = '<tr><td colspan="2" style="text-align:center; font-style: italic;">Please select a brand to view models.</td></tr>';
        sessionStorage.removeItem('selectedBrand');
        renderBreadcrumb(null, null);
    }

    function selectBrand(code, card) {
        if (selectedBrandCard) selectedBrandCard.classList.remove('selected');
        selectedBrandCard = card;
        card.classList.add('selected');
        sessionStorage.setItem('selectedBrand', code);
        loadModelsForBrand(code);
        const brandName = allBrandsList.find(b => b.code === code)?.name || code;
        renderBreadcrumb(code, brandName);
    }

    async function loadModelsForBrand(brandCode) {
        try {
            const allModelsData = await readDataJson(`data/brands/${brandCode.toLowerCase()}/models.json`);
            const allModelsForBrand = allModelsData[brandCode.toLowerCase()] || [];

            let availableModels = [];

            if (isElectronMode && localContentData) {
                const localBrandData = localContentData.find(b => b.brand.toLowerCase() === brandCode.toLowerCase());
                const availablePartsModelCodes = localBrandData ?
                    localBrandData.models.filter(m => m.hasParts).map(m => m.code.toLowerCase()) : [];
                availableModels = allModelsForBrand.filter(m =>
                    availablePartsModelCodes.includes(m.code.toLowerCase())
                );
            } else {
                availableModels = allModelsForBrand.filter(m => m.epc === true);
            }

            modelsTableBody.innerHTML = '';
            if (availableModels.length === 0) {
                throw new Error('No EPC models available for this brand.');
            }

            availableModels.sort((a,b) => a.name.localeCompare(b.name)).forEach(model => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${model.code}</td><td>${model.name}</td>`;
                tr.onclick = () => { window.location.href = `epc.html?brand=${brandCode.toLowerCase()}&model=${model.code.toLowerCase()}`; };
                modelsTableBody.appendChild(tr);
            });
        } catch (error) {
            modelsTableBody.innerHTML = `<tr><td colspan="2" style="text-align:center; font-style: italic;">${error.message}</td></tr>`;
        }
    }

    async function loadBrands() {
        try {
            if (isElectronMode && window.api && window.api.getLocalBrandsModels) {
                localContentData = await window.api.getLocalBrandsModels();
            }

            allBrandsList = await readDataJson('data/brands.json');
            brandsList.innerHTML = '';

            const filteredBrands = allBrandsList.filter(brand => {
                if (isElectronMode) {
                    return localContentData.some(localBrand =>
                        localBrand.brand.toLowerCase() === brand.code.toLowerCase() &&
                        localBrand.models.some(model => model.hasParts)
                    );
                } else {
                    return true;
                }
            });

            if (filteredBrands.length === 0) {
                let message = isElectronMode
                    ? '<b>No EPC models downloaded yet.</b><br><small>Download from <b>Settings</b>.</small>'
                    : 'No EPC models are available.';
                brandsList.innerHTML = `<div style="text-align:center; width:100%; padding: 1rem; border: 1px dashed var(--border); border-radius: 8px;">${message}</div>`;
                clearBrandSelection();
                return;
            }
            renderBrandCards(filteredBrands);
        } catch (error) {
            console.error("Error loading brands:", error);
            brandsList.innerHTML = `<p class="text-danger p-3">${error.message}</p>`;
        }
    }

    function renderBrandCards(brandsToRender) {
        const rootPath = window.location.pathname.includes('/epc/') ? '../' : './';
        brandsToRender.sort((a, b) => a.name.localeCompare(b.name));

        brandsToRender.forEach(brand => {
            const card = document.createElement('div');
            card.className = 'brand-card';
            card.dataset.code = brand.code;
            const invertClass = brand.invertInDark ? 'invert-in-dark' : '';
            const logoSrc = brand.logo.startsWith('http') ? brand.logo : `${rootPath}${brand.logo}`;
            card.innerHTML = `<img src="${logoSrc}" alt="${brand.name} logo" class="brand-logo ${invertClass}" onerror="this.style.display='none'" /><div class="brand-code">${brand.code}</div><div class="brand-name">${brand.name}</div>`;
            card.onclick = () => selectBrand(brand.code, card);
            brandsList.appendChild(card);
        });

        const savedBrand = sessionStorage.getItem('selectedBrand');
        if (savedBrand) {
            const brandCard = [...brandsList.children].find(c => c.dataset.code === savedBrand);
            if (brandCard) selectBrand(savedBrand, brandCard);
            else clearBrandSelection();
        } else {
            clearBrandSelection();
        }
    }
    loadBrands();
  }

  // --- UNIVERSAL MASTER EVENT LISTENER ---
  document.body.addEventListener('click', function(e) {
    const homeLink = e.target.closest('#epc-home-btn');
    const themeToggleButton = e.target.closest('#theme-toggle');
    const settingsButton = e.target.closest('#settings-toggle');

    if (homeLink) {
      e.preventDefault();
      const root = window.location.pathname.includes('/epc/') ? '../' : './';
      if (navigator.userAgent.toLowerCase().indexOf(' electron/') > -1) { window.location.href = root + 'app-home.html'; }
      else { window.location.href = root + 'index.html'; }
    }
    if (themeToggleButton) {
      const current = document.body.getAttribute('data-bs-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    }
    if (settingsButton) {
      e.preventDefault();
      const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('settingsModal'));
      modal.show();
      document.getElementById('model-search').value = "";
      if (typeof loadBrandModelsAccordion === 'function') {
        loadBrandModelsAccordion();
      }
    }
  });

  // --- MODAL-SPECIFIC EVENT LISTENERS ---
  const modelSearchInput = document.getElementById('model-search');
  if (modelSearchInput) {
    modelSearchInput.addEventListener('input', function(e) { renderAccordion(this.value); });
    document.getElementById('clear-model-search').addEventListener('click', function() { modelSearchInput.value = ""; renderAccordion(""); });
    document.getElementById('brandsAccordion').addEventListener('click', async function(e) {
      if (!e.target.classList.contains('download-btn')) return;
      const btn = e.target;
      await downloadFile(btn.dataset.brand, btn.dataset.model, btn.dataset.type, btn);
    });
  }

  if (window.api && window.api.onFileDownloadProgress) {
    window.api.onFileDownloadProgress(data => {
      const filename = data.dest.split('/').pop();
      const match = filename.match(/([^_]+)_([^_]+)_([^.]+)\.zip$/);
      if (!match) return;
      const [, brand, model, type] = match;
      const selector = `.download-btn[data-brand="${brand}"][data-model="${model}"][data-type="${type.replace(/s$/, '')}"]`;
      const btn = document.querySelector(selector);
      if (btn) {
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Downloading... <span class="text-info">${Math.round(data.percent)}%</span>`;
      }
    });
  }

  // --- UNIVERSAL PAGE INITIALIZATION ---
  setTheme(localStorage.getItem('theme') || 'dark');
  initializeEpcPage();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- [SETTINGS MODAL SCRIPT] -->
<script>
const DOWNLOAD_ROOT = "downloads";
const REMOTE_URL = "https://servicevault.xyz/downloads/";
let allBrandsWithModels = [];

function fileName(brand, model, type) {
  const fileType = type === 'manual' ? 'manuals' : 'epc';
  return `${brand.toLowerCase()}_${model.toLowerCase()}_${fileType}.zip`;
}

async function fileExistsLocally(brand, model, type) {
  if (!window.api || !window.api.checkFileExists) return false;
  const markerPath = `data/brands/${brand}/${model}/.unzipped_ok`;
  if (!await window.api.checkFileExists(markerPath)) return false;
  if (type === "manuals") {
    return await window.api.checkFileExists(`data/brands/${brand}/${model}/manual`);
  } else if (type === "epc") {
    const sectionsJson = `data/brands/${brand}/${model}/sections.json`;
    const diagramsFolder = `data/brands/${brand}/${model}/diagrams`;
    return (await window.api.checkFileExists(sectionsJson)) || (await window.api.checkFileExists(diagramsFolder));
  }
  return false;
}

async function fileExistsRemotely(brand, model, type) {
  const url = REMOTE_URL + fileName(brand, model, type);
  try { const resp = await fetch(url, { method: "HEAD" }); return resp.ok; } catch { return false; }
}

async function downloadFile(brand, model, type, btn) {
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Downloading...`;
  const zipFile = fileName(brand, model, type);
  const zipPath = `${DOWNLOAD_ROOT}/${zipFile}`;
  const url = REMOTE_URL + zipFile;
  const brandDataFolder = `data/brands/${brand}/`;
  const markerPath = `data/brands/${brand}/${model}/.unzipped_ok`;

  if (window.api && window.api.checkFileExists && window.api.deleteFolder) {
    if (await window.api.checkFileExists(`data/brands/${brand}/${model}/`) &&
        !await window.api.checkFileExists(markerPath)) {
      await window.api.deleteFolder(`data/brands/${brand}/${model}/`);
    }
  }

  let progressHandler;
  if (window.api && window.api.onFileDownloadProgress) {
    progressHandler = data => {
      if (data.dest === zipPath) {
        let speedStr = "", etaStr = "";
        if (data.speed > 0) speedStr = data.speed > 1024 * 1024 ? (data.speed / 1024 / 1024).toFixed(2) + " MB/s" : (data.speed / 1024).toFixed(0) + " KB/s";
        if (data.eta > 0 && isFinite(data.eta)) { let sec = Math.round(data.eta); etaStr = sec > 90 ? Math.round(sec/60)+" min" : sec+"s"; }
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Downloading... <span class="text-info">${data.percent}%</span> ${speedStr ? `<span class="text-muted" style="font-size:0.94em;">${speedStr}</span>` : ""} ${etaStr ? `<span class="text-warning" style="font-size:0.94em;">${etaStr} left</span>` : ""}`;
      }
    };
    window.api.onFileDownloadProgress(progressHandler);
  }

  try {
    if (window.api && window.api.downloadFile && window.api.unzipFile && window.api.writeFile) {
      await window.api.downloadFile(url, zipPath);
      btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Unzipping...`;
      await window.api.unzipFile(zipPath, brandDataFolder);
      await window.api.writeFile(markerPath, "OK");
      btn.innerHTML = "Redownload";
      btn.classList.remove("btn-outline-primary", "btn-outline-warning");
      btn.classList.add("btn-success");
      btn.disabled = false;
    } else {
      window.open(url, "_blank");
      btn.textContent = "Download";
      btn.disabled = false;
    }
  } catch(error) {
    btn.textContent = "Download";
    btn.disabled = false;
    alert("Error downloading or unzipping file. " + error.message);
  }
}

async function loadBrandModelsAccordion(filter = "") {
  const accordion = document.getElementById('brandsAccordion');
  accordion.innerHTML = '<div class="text-center text-secondary py-3">Loading...</div>';
  allBrandsWithModels = [];
  try {
    const rootPath = window.location.pathname.includes('/epc/') ? '../' : './';
    const brands = await (await fetch(`${rootPath}data/brands.json`)).json();
    brands.sort((a, b) => a.name.localeCompare(b.name));
    for (const brand of brands) {
      try {
        const modelsUrl = `${rootPath}data/brands/${brand.code.toLowerCase()}/models.json`;
        const modelsData = await (await fetch(modelsUrl)).json();
        let models = (modelsData[brand.code.toLowerCase()] || []).slice().sort((a, b) => a.name.localeCompare(b.name));
        allBrandsWithModels.push({ brand: brand.code.toLowerCase(), brandName: brand.name, models: models });
      } catch (err) {}
    }
    renderAccordion(filter);
  } catch (err) {
    accordion.innerHTML = '<div class="text-danger text-center py-3">Failed to load brands or models.</div>';
  }
}

function renderAccordion(filter = "") {
  const accordion = document.getElementById('brandsAccordion');
  accordion.innerHTML = "";
  let filteredBrands = allBrandsWithModels.map(b => ({
    ...b,
    models: filter ? b.models.filter(m => b.brandName.toLowerCase().includes(filter.toLowerCase()) || m.name.toLowerCase().includes(filter.toLowerCase())) : b.models
  })).filter(b => b.models.length);
  if (!filteredBrands.length) {
    accordion.innerHTML = '<div class="text-muted text-center py-3">No models found.</div>';
    return;
  }
  filteredBrands.forEach((brand, i) => {
    const card = document.createElement('div');
    card.className = 'accordion-item';
    card.innerHTML = `<h2 class="accordion-header" id="heading${i}"><button class="accordion-button ${i > 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${i}">${brand.brandName}</button></h2><div id="collapse${i}" class="accordion-collapse collapse ${i === 0 ? 'show' : ''}" data-bs-parent="#brandsAccordion"><div class="accordion-body" style="padding:0;"><table class="table table-striped align-middle mb-0"><thead><tr><th>Model</th><th>Manual</th><th>Parts</th></tr></thead><tbody>${brand.models.map(model => `<tr><td>${model.name}</td><td>${model.servicemanual ? `<button class="btn btn-sm btn-outline-primary download-btn" data-brand="${brand.brand}" data-model="${model.code.toLowerCase()}" data-type="manual">Download</button>` : '<span class="text-muted">—</span>'}</td><td>${model.epc ? `<button class="btn btn-sm btn-outline-warning download-btn" data-brand="${brand.brand}" data-model="${model.code.toLowerCase()}" data-type="epc">Download</button>` : '<span class="text-muted">—</span>'}</td></tr>`).join("")}</tbody></table></div></div>`;
    accordion.appendChild(card);
    setTimeout(() => { // Check file status asynchronously
      brand.models.forEach(async (model) => {
        if (model.servicemanual) {
          const btn = card.querySelector(`.download-btn[data-model="${model.code.toLowerCase()}"][data-type="manual"]`);
          if (btn) {
            if (await fileExistsLocally(brand.brand, model.code, "manuals")) {
              btn.innerHTML = "Redownload"; btn.classList.replace("btn-outline-primary", "btn-success");
            } else if (!await fileExistsRemotely(brand.brand, model.code, "manuals")) {
              btn.textContent = "Not found"; btn.disabled = true;
            }
          }
        }
        if (model.epc) {
          const btn = card.querySelector(`.download-btn[data-model="${model.code.toLowerCase()}"][data-type="epc"]`);
          if (btn) {
            if (await fileExistsLocally(brand.brand, model.code, "epc")) {
              btn.innerHTML = "Redownload"; btn.classList.replace("btn-outline-warning", "btn-success");
            } else if (!await fileExistsRemotely(brand.brand, model.code, "epc")) {
              btn.textContent = "Not found"; btn.disabled = true;
            }
          }
        }
      });
    }, 0);
  });
}
</script>

<div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered" style="max-width:900px;">
    <div class="modal-content">
      <div class="modal-header"><h2 class="modal-title fs-5" id="settingsModalLabel">Download Model Data</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button></div>
      <div class="modal-body" style="padding:0;">
        <div class="d-flex align-items-center" style="padding:1.1em 1em 0.4em 1em;gap:1.2em;">
          <input type="text" id="model-search" class="form-control" placeholder="Search brand or model..."><button id="clear-model-search" class="btn btn-outline-secondary btn-sm" title="Clear Search" style="min-width:34px;">×</button>
        </div>
        <div id="brandsAccordion" class="accordion" style="max-height:70vh;overflow-y:auto;padding:1em;"></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div>
    </div>
  </div>
</div>
