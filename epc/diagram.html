	<style>
html,body{height:100%;width:100vw;margin:0;padding:0;font-family:sans-serif;background:#f4f4f9;transition:background-color .3s}
body{display:flex;flex-direction:column;min-height:100vh}
.epc-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;flex-shrink:0}
.epc-header-left{display:flex;align-items:center;gap:.9rem}
.epc-header h1{font-size:1.6rem;font-weight:700;color:#121212;margin:0}
.epc-header-actions{display:flex;align-items:center;gap:.7rem}
.epc-header-home{display:inline-block;padding:.6rem 1.4rem;font-size:1.14rem;font-weight:600;color:#6c757d;border:1.5px solid #dee2e6;border-radius:8px;text-decoration:none;transition:background .18s,color .18s,border .18s;letter-spacing:.01em}
.epc-header-home:hover{color:#007bff;border-color:#007bff}
.epc-theme-toggle{background:#fff;border:1.5px solid #dee2e6;border-radius:50%;cursor:pointer;width:44px;height:44px;display:flex;justify-content:center;align-items:center;color:#6c757d;font-size:1.2rem;transition:background-color .3s,border-color .3s}
#main-app-content{flex-grow:1;display:flex;flex-direction:row;gap:2rem;width:100vw;height:calc(100vh - 150px);min-height:0;padding:0 1.5vw 1.5vw;box-sizing:border-box;overflow:hidden}
#diagram-container,#parts-table-wrapper{height:100%;margin:0;padding:0;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.05);background:#fff;overflow:hidden;min-width:350px;display:flex;flex-direction:column}
#diagram-container{max-width:50vw;margin-right:1rem;background:#f8f8f8;justify-content:center;align-items:center;position:relative}
#diagram-wrapper{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;transform-origin:top left;cursor:grab;-webkit-user-select:none;user-select:none}
#diagram-wrapper.dragging{cursor:grabbing}
#diagram{display:block;width:100%;height:100%;max-width:100%;-o-object-fit:contain;object-fit:contain;margin:0 auto}
#callouts-layer{position:absolute}
.callout{position:absolute;width:20px;height:20px;background-color:rgba(255,0,0,.42);border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;pointer-events:auto;z-index:10;transition:background-color .15s,border .15s;border:2px solid rgba(0,0,0,.13);box-shadow:0 2px 8px 0 rgba(0,0,0,.09)}
.callout:hover{background-color:rgba(255,45,45,.45)}
.callout.active{background-color:rgba(23,147,255,.42);border:2.5px solid #055b8c;box-shadow:0 2px 12px 0 rgba(23,147,255,.15)}
#controls{position:absolute;top:10px;left:10px;z-index:20;background:rgba(255,255,255,.8);padding:5px;border-radius:5px;box-shadow:0 2px 5px rgba(0,0,0,.2)}
#controls button{padding:5px 10px;margin-right:5px;cursor:pointer;border:1px solid #ccc;border-radius:3px;background-color:#f0f0f0;color:#333}
#controls button:hover{background-color:#e0e0e0}
#parts-table-wrapper{max-width:58vw;min-width:380px;overflow-y:auto;flex:1 1 0;background:#fff}
#parts-table{width:100%;border-collapse:collapse;cursor:pointer;table-layout:fixed}
#parts-table td,#parts-table th{padding:.6rem;text-align:left;font-size:.9em;overflow-wrap:break-word}
#parts-table td.part-desc-cell{line-height:1.25}
.part-desc-main{display:block}
#parts-table thead th{position:sticky;top:0;background-color:#003366;color:#fff;z-index:1}
#parts-table tbody tr:nth-child(even){background-color:#f9f9f9}
#parts-table tbody tr:hover{background-color:#e0f0ff}
tr.highlight{background-color:#ffe68b!important}
.col-call{width:5%}
.col-part{width:15%}
.col-desc{width:35%}
.col-usage{width:20%}
.col-range{width:15%}
.col-qty{width:5%}
.col-details{width:5%}
.breadcrumb{display:flex;flex-wrap:wrap;padding:.5rem 1rem;list-style:none;background-color:#e9ecef;border-radius:.25rem;font-size:.9rem;color:#003366;margin:0 1rem 1rem}
.breadcrumb-item+.breadcrumb-item::before{content:"›";padding:0 .5rem;color:#6c757d;-webkit-user-select:none;user-select:none;font-weight:700;font-size:1rem}
.breadcrumb-item a{color:#003366;text-decoration:none;cursor:pointer}
.breadcrumb-item a:hover{text-decoration:underline}
.breadcrumb-item.active{color:#555;font-weight:600}

@media (max-width:1000px),(max-aspect-ratio:3/4){
#main-app-content{flex-direction:column;height:auto;gap:.8rem;padding:0 .5rem .5rem;width:100%;min-width:0;box-sizing:border-box;overflow-x:hidden}
#diagram-container{width:100%;max-width:100%;min-width:0;margin-right:0;height:50vh;min-height:180px;overflow-x:hidden;box-sizing:border-box}
#diagram-wrapper{width:100%;height:100%;overflow-x:hidden;box-sizing:border-box;display:flex;align-items:center;justify-content:center}
#diagram{width:100%!important;max-width:100%;height:100%;-o-object-fit:contain;object-fit:contain;display:block}
#parts-table-wrapper{width:100%;max-width:100%;min-width:0;margin-top:1rem;padding:0;overflow-x:auto;background:#fff;height:auto;min-height:180px;box-sizing:border-box}
#parts-table{max-width:none;table-layout:auto;display:table}
}

body[data-bs-theme=dark]{background:#212529;color:#e1e9f7}
body[data-bs-theme=dark] .epc-header h1{color:#dee2e6}
body[data-bs-theme=dark] .epc-header-home,
body[data-bs-theme=dark] .epc-theme-toggle{border-color:#6c757d;color:#adb5bd}
body[data-bs-theme=dark] #diagram-container{background:#1a1a1a}
body[data-bs-theme=dark] .breadcrumb{background:#495057;color:#c7d7ef}
body[data-bs-theme=dark] #parts-table-wrapper{background:#181818}
body[data-bs-theme=dark] .breadcrumb-item a{color:#c7d7ef}
body[data-bs-theme=dark] .epc-theme-toggle{background:#212529}
body[data-bs-theme=dark] #parts-table thead th{background-color:#52789b}
body[data-bs-theme=dark] #parts-table tbody tr:nth-child(even){background-color:#2a2a2a}
body[data-bs-theme=dark] #parts-table tbody tr:hover{background-color:#25344a}
body[data-bs-theme=dark] .breadcrumb-item.active{color:#fff}
body[data-bs-theme=dark] tr.highlight{background-color:#b3a061!important}
body[data-bs-theme=dark] [data-invert-in-dark=true]{filter:invert(1) hue-rotate(180deg)}

#details-modal{position:fixed;left:0;top:0;width:100vw;height:100vh;background:rgba(0,0,0,.32);z-index:9999;display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{0%{opacity:0}to{opacity:1}}
.details-modal-dialog{max-height:98vh;display:flex;flex-direction:column;background:#fff;border-radius:10px;width:900px;max-width:94vw;box-shadow:0 8px 36px #0002;margin:auto;position:relative;animation:slideUp .2s}
@keyframes slideUp{0%{transform:translateY(40px)}to{transform:none}}
.details-modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 1.6rem;border-bottom:1px solid #eee}
.details-modal-main{flex:1 1 auto;display:flex;flex-direction:column;padding:0 1.6rem 1rem}
#details-modal-title{font-size:1.14em;font-weight:700;color:#003366}
.details-modal-close{font-size:1.6em;background:0 0;border:none;cursor:pointer;color:#888}
.details-modal-table{width:100%;margin-top:1rem;border-collapse:collapse;font-size:1em}
.details-modal-table th{text-align:left;color:#555;width:100px;padding:6px 7px;background:#f8fafc}
.details-modal-table td{color:#222;padding:6px 7px}
.details-modal-tabs{display:flex;gap:.5rem;margin-top:1rem}
.details-modal-tabs button{background:#f5f7fa;border:none;border-radius:6px 6px 0 0;padding:.5em 1.2em;cursor:pointer;font-weight:500;color:#003366;border-bottom:2px solid transparent;transition:background .12s}
.details-modal-tabs button.active{background:#fff;border-bottom:2px solid #003366;color:#0d356b}
.tab-content-outer{background:#fff;border:1px solid #e0e6ef;border-radius:0 7px 7px;margin-top:-1px;box-shadow:0 2px 8px #0001;flex:1 1 auto;display:flex;min-height:180px}
#details-modal-tab-content{width:100%;padding:1.1em 1.4em;font-size:1.05em;box-sizing:border-box;background:#fff;border-radius:7px;overflow-y:auto}

body[data-bs-theme=dark] .details-modal-dialog{background:#2c3034;border-color:#495057}
body[data-bs-theme=dark] .details-modal-header{border-bottom-color:#495057}
body[data-bs-theme=dark] #details-modal-title{color:#eaf1ff}
body[data-bs-theme=dark] .details-modal-close{color:#adb5bd}
body[data-bs-theme=dark] .details-modal-table th{background:#212529;color:#adb5bd}
body[data-bs-theme=dark] .details-modal-table td{color:#e1e9f7}
body[data-bs-theme=dark] .details-modal-tabs button{background:#212529;color:#c7d7ef}
body[data-bs-theme=dark] .details-modal-tabs button.active{background:#2c3034;border-bottom-color:#0d6efd;color:#eaf1ff}
body[data-bs-theme=dark] .tab-content-outer{background:#2c3034;border-color:#495057}
body[data-bs-theme=dark] #details-modal-tab-content{background:#2c3034}
body[data-bs-theme=dark] #diagram{filter:invert(.92) grayscale(.72) brightness(1.11) contrast(.97) hue-rotate(208deg);transition:filter .3s}
body[data-bs-theme=dark] ::-webkit-scrollbar{width:12px;background:#23272e}
body[data-bs-theme=dark] ::-webkit-scrollbar-thumb{background:#3d434e;border-radius:8px;border:2px solid #23272e}
body[data-bs-theme=dark] ::-webkit-scrollbar-thumb:hover{background:#596080}
body[data-bs-theme=dark] ::-webkit-scrollbar-corner{background:#23272e}
body[data-bs-theme=dark]{scrollbar-color:#3d434e #23272e;scrollbar-width:thin}
body[data-bs-theme=dark] #diagram-container,
body[data-bs-theme=dark] #diagram-panzoom,
body[data-bs-theme=dark] #diagram-wrapper{background:#1a1a1a!important}

#details-modal .details-modal-dialog{max-height:90vh;display:flex;flex-direction:column}
#details-modal .details-modal-main{flex:1 1 auto;overflow-y:auto;max-height:60vh;min-height:120px}

.part-details-btn{background:#003366;color:#fff;border:none;border-radius:6px;padding:.5em 1.4em;font-size:1em;font-weight:500;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.09);transition:background .16s,color .16s,box-shadow .16s;outline:none;margin:.2em 0}
.part-details-btn:hover,
.part-details-btn:focus{background:#055b8c;color:#fff;box-shadow:0 2px 6px rgba(23,147,255,.10)}
body[data-bs-theme="dark"] .part-details-btn{background:#1a3450;color:#eaf1ff;border:none}
body[data-bs-theme="dark"] .part-details-btn:hover,
body[data-bs-theme="dark"] .part-details-btn:focus{background:#256fa1;color:#fff}

@media (max-width:600px){
.epc-header-home,#theme-toggle,#settings-toggle{padding:.1rem .2rem;font-size:.91rem}
}

#parts-table{table-layout:fixed;width:100%;min-width:650px}
#parts-table-wrapper{overflow-x:auto}
#parts-table .part-details-btn{padding:.25em .8em;font-size:.95em;min-width:60px;white-space:nowrap;margin:0;display:inline-block}

.parts-group-row td.parts-group-cell{
    font-weight:700;
    background:rgba(0,51,102,.08);
    color:#003366;
    border-top:1px solid #cfd8e3;
    border-bottom:1px solid #cfd8e3;
    padding:.45rem .6rem;
}

body[data-bs-theme="dark"] .parts-group-row td.parts-group-cell{
    background:rgba(82,120,155,.18);
    color:#eaf1ff;
    border-top:1px solid #495057;
    border-bottom:1px solid #495057;
}

.parts-note-row td{
    padding:.38rem .6rem;
    font-size:.92em;
    line-height:1.25;
    color:#b33a3a;
    background:#eef2f6;
    border-top:1px solid #d7dee8;
    border-bottom:1px solid #d7dee8;
}

.parts-note-text{
    font-weight:400;
    white-space:pre-wrap;
}

body[data-bs-theme="dark"] .parts-note-row td{
    color:#ff9a9a;
    background:#31363c;
    border-top:1px solid #495057;
    border-bottom:1px solid #495057;
}
</style>
	
	
	
	
</head>

          <input type="text" id="model-search" class="form-control" placeholder="Search brand or model...">
          <button id="clear-model-search" class="btn btn-outline-secondary btn-sm" title="Clear Search" style="min-width:34px;">×</button>
        </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {

    function getRootPath() { return window.location.pathname.includes('/epc/') ? '../' : './'; }
    function isElectron() { return navigator.userAgent.toLowerCase().indexOf(' electron/') > -1; }

    async function readDataJson(relPath) {
        if (isElectron() && window.api && typeof window.api.readDataFile === 'function') {
            try {
                const content = await window.api.readDataFile(relPath);
                return JSON.parse(content);
            } catch (error) {
                console.error(`Electron: Local file read failed for ${relPath}.`, error);
                throw new Error(`Local file not found: ${relPath}`);
            }
        } else {
            try {
                const response = await fetch(getRootPath() + relPath);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} for ${relPath}`);
                }
                return await response.json();
            } catch (error) {
                console.error(`Web: Could not fetch file ${relPath}.`, error);
                throw new Error(`Failed to fetch from web host: ${relPath}`);
            }
        }
    }

    function setTheme(theme) {
        document.body.setAttribute('data-bs-theme', theme || 'light');
        localStorage.setItem('theme', theme || 'light');
        updateThemeIcon();
    }

    function updateThemeIcon() {
        const isDark = document.body.getAttribute('data-bs-theme') === 'dark';
        document.querySelectorAll('#theme-toggle').forEach(btn => {
            const moon = btn.querySelector('.moon-icon');
            const sun = btn.querySelector('.sun-icon');
            if (moon && sun) {
                moon.style.display = isDark ? 'none' : 'inline-block';
                sun.style.display = isDark ? 'inline-block' : 'none';
            }
        });
    }

    function initializeDiagramPage() {
        const rootPath = getRootPath();
        const urlParams = new URLSearchParams(window.location.search);
        let currentlyHighlightedCall = null;

        const diagramContainer = document.getElementById('diagram-container');
        const diagramWrapper = document.getElementById('diagram-wrapper');
        const diagram = document.getElementById('diagram');
        const calloutsLayer = document.getElementById('callouts-layer');
        const partsTableBody = document.querySelector('#parts-table tbody');

        let scale = 1, panX = 0, panY = 0, isDragging = false, lastMouseX = 0, lastMouseY = 0;

        let touchStartDist = null, lastTouchMid = null;
        if (diagramWrapper) {
            diagramWrapper.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) {
                    isDragging = true;
                    diagramWrapper.classList.add("dragging");
                    lastMouseX = e.touches[0].clientX;
                    lastMouseY = e.touches[0].clientY;
                } else if (e.touches.length === 2) {
                    isDragging = false;
                    touchStartDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    lastTouchMid = {
                        x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                        y: (e.touches[0].clientY + e.touches[1].clientY) / 2
                    };
                }
            }, { passive: false });

            window.addEventListener('touchmove', function(e) {
                if (e.touches.length === 1 && isDragging) {
                    let dx = e.touches[0].clientX - lastMouseX;
                    let dy = e.touches[0].clientY - lastMouseY;
                    panX += dx;
                    panY += dy;
                    lastMouseX = e.touches[0].clientX;
                    lastMouseY = e.touches[0].clientY;
                    applyTransform();
                    e.preventDefault();
                } else if (e.touches.length === 2 && touchStartDist) {
                    let dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const ZOOM_SENSITIVITY = 0.25;
                    let zoomDelta = (dist - touchStartDist) * ZOOM_SENSITIVITY / touchStartDist;
                    let newScale = Math.max(0.2, Math.min(5, scale + zoomDelta));
                    if (lastTouchMid && diagramContainer) {
                        let rect = diagramContainer.getBoundingClientRect();
                        let mx = lastTouchMid.x - rect.left;
                        let my = lastTouchMid.y - rect.top;
                        let xRel = (mx - panX) / scale;
                        let yRel = (my - panY) / scale;
                        panX = mx - xRel * newScale;
                        panY = my - yRel * newScale;
                    }
                    scale = newScale;
                    applyTransform();
                    e.preventDefault();
                }
            }, { passive: false });

            window.addEventListener('touchend', function() {
                isDragging = false;
                touchStartDist = null;
                lastTouchMid = null;
                diagramWrapper.classList.remove("dragging");
            }, { passive: false });
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(value, max));
        }

        function applyTransform() {
            if (!diagramContainer) return;
            let e = diagram.clientWidth, t = diagram.clientHeight, a = diagramContainer.clientWidth, n = diagramContainer.clientHeight;
            let o = e * scale, i = t * scale, r = Math.max(0, o - a), l = Math.max(0, i - n);
            panX = o < a ? (a - o) / 2 : clamp(panX, -r, 0);
            panY = i < n ? (n - i) / 2 : clamp(panY, -l, 0);
            let s = document.getElementById("diagram-panzoom");
            if (s) {
                s.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                s.style.transformOrigin = "top left";
            }
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }




function getCurrentDetailTitle() {
    const breadcrumbActive = document.querySelector('#epc-breadcrumb .breadcrumb-item.active');
    if (breadcrumbActive) return String(breadcrumbActive.textContent || '').trim();

    const urlParams = new URLSearchParams(window.location.search);
    return String(urlParams.get('detail') || '').trim();
}

function appendTopDetailHeadingRow(title) {
    if (!partsTableBody || !title) return;

    const headingRow = document.createElement("tr");
    headingRow.className = "parts-group-row parts-top-detail-row";
    headingRow.innerHTML = `
        <td colspan="7" class="parts-group-cell">${escapeHtml(title)}</td>
    `;
    partsTableBody.appendChild(headingRow);
}


function renderPartsTable(partsOrGroups) {
    if (!partsTableBody) return;
    partsTableBody.innerHTML = "";

    const topDetailTitle = getCurrentDetailTitle();

            if (
                Array.isArray(partsOrGroups) &&
                partsOrGroups.length &&
                partsOrGroups[0] &&
                Object.prototype.hasOwnProperty.call(partsOrGroups[0], 'groupTitle')
            ) {
let flatIndex = 0;

appendTopDetailHeadingRow(topDetailTitle);

for (const group of partsOrGroups) {
                    const headingRow = document.createElement("tr");
                    headingRow.className = "parts-group-row";
                    headingRow.innerHTML = `
                        <td colspan="7" class="parts-group-cell">${escapeHtml(group.groupTitle || "")}</td>
                    `;
                    partsTableBody.appendChild(headingRow);

                    for (const part of group.parts) {
                        if (part.hidden) continue;

                        const row = document.createElement("tr");
                        row.setAttribute("data-call", part.call || "");
                        row.innerHTML = `
                            <td>${escapeHtml(part.call || "")}</td>
                            <td>${escapeHtml(part.part || "")}</td>
                            <td class="part-desc-cell"><span class="part-desc-main">${escapeHtml(part.desc || "")}</span></td>
                            <td>${escapeHtml(part.usage || "")}</td>
                            <td>${escapeHtml(part.range || "")}</td>
                            <td>${escapeHtml(part.qty || "")}</td>
                            <td>${part.reach || part.history ? `<button class="part-details-btn" data-part-index="${flatIndex}">Details</button>` : ""}</td>
                        `;
                        row.addEventListener("click", () => highlightElements(part.call));
                        partsTableBody.appendChild(row);

                        if (part.note && String(part.note).trim()) {
                            const noteRow = document.createElement("tr");
                            noteRow.className = "parts-note-row";
                            noteRow.innerHTML = `
                                <td colspan="7"><div class="parts-note-text">${escapeHtml(part.note)}</div></td>
                            `;
                            partsTableBody.appendChild(noteRow);
                        }

                        flatIndex++;
                    }
                }

                document.querySelectorAll(".part-details-btn").forEach(btn => {
                    btn.onclick = function(e) {
                        e.stopPropagation();
                        let idx = Number(this.dataset.partIndex);
                        let part = window.currentPartsData[idx];
                        showDetailsModal(part);
                    };
                });

                return;
            }

const parts = partsOrGroups || [];

appendTopDetailHeadingRow(topDetailTitle);

for (let i = 0; i < parts.length; i++) {
                const part = parts[i];
                if (part.hidden) continue;

                const row = document.createElement("tr");
                row.setAttribute("data-call", part.call || "");
                row.innerHTML = `
                    <td>${escapeHtml(part.call || "")}</td>
                    <td>${escapeHtml(part.part || "")}</td>
                    <td class="part-desc-cell"><span class="part-desc-main">${escapeHtml(part.desc || "")}</span></td>
                    <td>${escapeHtml(part.usage || "")}</td>
                    <td>${escapeHtml(part.range || "")}</td>
                    <td>${escapeHtml(part.qty || "")}</td>
                    <td>${part.reach || part.history ? `<button class="part-details-btn" data-part-index="${i}">Details</button>` : ""}</td>
                `;
                row.addEventListener("click", () => highlightElements(part.call));
                partsTableBody.appendChild(row);

                if (part.note && String(part.note).trim()) {
                    const noteRow = document.createElement("tr");
                    noteRow.className = "parts-note-row";
                    noteRow.innerHTML = `
                        <td colspan="7"><div class="parts-note-text">${escapeHtml(part.note)}</div></td>
                    `;
                    partsTableBody.appendChild(noteRow);
                }
            }

            document.querySelectorAll(".part-details-btn").forEach(btn => {
                btn.onclick = function(e) {
                    e.stopPropagation();
                    let idx = this.dataset.partIndex;
                    let part = window.currentPartsData[idx];
                    showDetailsModal(part);
                };
            });
        }

        function renderCallouts(parts) {
            if (!calloutsLayer || !diagramWrapper || !diagram || !diagram.naturalWidth) return;

            calloutsLayer.innerHTML = "";

            let e = diagramWrapper.clientWidth,
                t = diagramWrapper.clientHeight,
                a = diagram.naturalWidth / diagram.naturalHeight,
                n = e / t,
                o, i, r, l;

            if (a > n) {
                o = e;
                i = e / a;
                r = 0;
                l = (t - i) / 2;
            } else {
                o = t * a;
                i = t;
                r = (e - o) / 2;
                l = 0;
            }

            calloutsLayer.style.cssText = `position:absolute; left:${r}px; top:${l}px; width:${o}px; height:${i}px; pointer-events:none;`;

            for (const part of parts) {
                let positions = [];
                if (Array.isArray(part.positions) && part.positions.length) {
                    positions = part.positions;
                } else if (typeof part.x === "number" && typeof part.y === "number") {
                    positions = [{ x: part.x, y: part.y }];
                }

                for (const pos of positions) {
                    let d = document.createElement("div");
                    d.className = "callout";
                    d.setAttribute("data-call", part.call || "");
                    d.style.left = (pos.x / diagram.naturalWidth * o) + "px";
                    d.style.top = (pos.y / diagram.naturalHeight * i) + "px";
                    d.title = `Callout ${part.call || ""}`;
                    d.style.pointerEvents = "auto";

                    d.addEventListener('click', function(e) {
                        e.stopPropagation();

                        if (part.link && part.link.detail && part.link.call) {
                            const params = new URLSearchParams(window.location.search);
                            params.set('detail', part.link.detail);
                            params.set('highlight', part.link.call);
                            window.location.search = params.toString();
                        } else if (part.link) {
                            const params = new URLSearchParams(window.location.search);
                            if (part.link.section) params.set('section', part.link.section);
                            if (part.link.subsection) params.set('subsection', part.link.subsection);
                            if (part.link.detail) params.set('detail', part.link.detail);
                            if (part.link.call) params.set('highlight', part.link.call);
                            window.location.search = params.toString();
                        } else {
                            highlightElements(part.call);
                        }
                    });

                    calloutsLayer.appendChild(d);
                }
            }
        }

        function highlightElements(callNum, forceOn = false) {
            document.querySelectorAll(".callout").forEach(e => e.classList.remove("active"));
            document.querySelectorAll("#parts-table tbody tr").forEach(e => e.classList.remove("highlight"));

            currentlyHighlightedCall = (forceOn || currentlyHighlightedCall !== callNum) ? callNum : null;

            if (currentlyHighlightedCall) {
                document.querySelectorAll(`.callout[data-call="${currentlyHighlightedCall}"]`).forEach(e => e.classList.add("active"));
                document.querySelectorAll(`#parts-table tbody tr[data-call="${currentlyHighlightedCall}"]`).forEach(e => {
                    e.classList.add("highlight");
                    e.scrollIntoView({ behavior: "smooth", block: "nearest" });
                });
            }
        }

        function highlightFromUrl() {
            const e = new URLSearchParams(window.location.search).get("highlight");
            if (e) highlightElements(e, true);
        }

        function showDetailsModal(part) {
            var elTitle = document.getElementById("details-modal-title"),
                elMain = document.querySelector("#details-modal .details-modal-main"),
                modal = document.getElementById("details-modal");

            if (!elTitle || !elMain || !modal) return;

            elTitle.textContent = "Part Details: " + (part.part || "");

            let reachContent = part.reach && Array.isArray(part.reach) && part.reach.length
                ? "<ul>" + part.reach.map(item => `<li>${Array.isArray(item) ? item.join(" ") : item}</li>`).join("") + "</ul>"
                : "<div style='color:#888'>No REACH data available.</div>";

            let historyContent = part.history
                ? Array.isArray(part.history)
                    ? `<table style="width:100%; border-collapse: collapse;"><tr><th style="text-align:left; padding:4px; border-bottom:1px solid #eee;">Part #</th><th style="text-align:left; padding:4px; border-bottom:1px solid #eee;">Description</th></tr>${part.history.map(row => `<tr><td style="padding:4px;">${row.part || ""}</td><td style="padding:4px;">${row.desc || ""}</td></tr>`).join("")}</table>`
                    : `<p>${part.history}</p>`
                : "<div style='color:#888'>No history data available.</div>";

            elMain.innerHTML = `
                <table class="details-modal-table">
                    <tr><th>Part #</th><td>${part.part || ""}</td><th>Description</th><td>${part.desc || ""}</td></tr>
                    <tr><th>Callout #</th><td>${part.call || ""}</td><th>Usage</th><td>${part.usage || ""}</td></tr>
                    <tr><th>Location</th><td>${part.location || part.loc || ""}</td><th>Range</th><td>${part.range || ""}</td></tr>
                </table>
                <div class="details-modal-tabs">
                    <button id="tab-reach" class="active">REACH</button>
                    <button id="tab-history">History</button>
                </div>
                <div class="tab-content-outer">
                    <div id="details-modal-tab-content">${reachContent}</div>
                </div>
                <div style="text-align:right; padding-top:1rem;">
                    <button id="details-modal-bottom-close" style="min-width: 90px; background: #003366; color: #fff; border: none; border-radius: 5px; padding: 0.7em 1.8em; font-size: 1em; cursor: pointer;">Close</button>
                </div>
            `;

            const tabReach = elMain.querySelector("#tab-reach"),
                  tabHistory = elMain.querySelector("#tab-history"),
                  tabContent = elMain.querySelector("#details-modal-tab-content"),
                  bottomClose = elMain.querySelector("#details-modal-bottom-close");

            tabReach.onclick = () => {
                tabContent.innerHTML = reachContent;
                tabReach.classList.add("active");
                tabHistory.classList.remove("active");
            };

            tabHistory.onclick = () => {
                tabContent.innerHTML = historyContent;
                tabHistory.classList.add("active");
                tabReach.classList.remove("active");
            };

            bottomClose.onclick = () => {
                modal.style.display = "none";
            };

            modal.style.display = "flex";
        }

        document.getElementById('close-details-modal').onclick = closeDetailsModal;
        document.getElementById('details-modal').addEventListener('mousedown', function(e) {
            if (e.target === this) closeDetailsModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape" && document.getElementById('details-modal').style.display === 'flex') {
                closeDetailsModal();
            }
        });

        function closeDetailsModal() {
            document.getElementById('details-modal').style.display = 'none';
        }

        function isChildLikeName(name) {
            const n = String(name || '').trim().toUpperCase();
            return /^(FOR|EXCEPT|WITHOUT|WITH|DIESEL|PETROL|ECOFLEX|ESTATE|5 DOOR|3 DOOR|4 DOOR|HATCH|SALOON|WAGON|SPORTS TOURER|LHD|RHD|FWD|AWD)\b/i.test(n);
        }

        function getDetailDisplayType(detail, index, allDetails) {
            if (detail.display_type) return detail.display_type;
            if (detail.type === 'heading' || detail.type === 'item' || detail.type === 'child') return detail.type;
            if (detail.parent_code) return 'child';

            const next = allDetails && allDetails[index + 1] ? allDetails[index + 1] : null;
            if (next && isChildLikeName(next.name) && !isChildLikeName(detail.name)) return 'heading';
            if (isChildLikeName(detail.name)) return 'child';
            return 'item';
        }

        function getDetailRouteCode(detail) {
            return String(detail.file_code || detail.code || '').trim();
        }

        async function loadDetailsListForCurrentPage() {
            const brandCode = urlParams.get('brand');
            const modelCode = urlParams.get('model');
            const sectionCode = urlParams.get('section');
            const subsectionCode = urlParams.get('subsection');
            const detailsFileSegment = subsectionCode ? `${sectionCode}_${subsectionCode}` : `${sectionCode}`;
            return await readDataJson(`data/brands/${brandCode}/${modelCode}/details_${detailsFileSegment}.json`);
        }

        async function resolvePartsFilesForSelection() {
            const detailCode = urlParams.get('detail');
            const detailsList = await loadDetailsListForCurrentPage();
            const idx = detailsList.findIndex(d => String(d.code) === String(detailCode));

            if (idx === -1) {
                return {
                    mode: 'single',
                    files: [{ code: detailCode, name: null }],
                    detailMeta: null
                };
            }

            const detail = detailsList[idx];
            const type = getDetailDisplayType(detail, idx, detailsList);

            if (type !== 'heading') {
                return {
                    mode: 'single',
                    files: [{
                        code: getDetailRouteCode(detail) || detailCode,
                        name: detail.name || null
                    }],
                    detailMeta: detail
                };
            }

            const files = [];
            for (let i = idx + 1; i < detailsList.length; i++) {
                const row = detailsList[i];
                const rowType = getDetailDisplayType(row, i, detailsList);
                if (rowType === 'heading') break;

                const code = getDetailRouteCode(row) || row.code;
                if (code) {
                    files.push({
                        code: String(code),
                        name: row.name || '',
                        meta: row
                    });
                }
            }

            return {
                mode: 'grouped',
                files,
                detailMeta: detail
            };
        }

        async function loadPartsAndDiagram() {
            const brandCode = urlParams.get('brand'),
                  modelCode = urlParams.get('model'),
                  sectionCode = urlParams.get('section'),
                  subsectionCode = urlParams.get('subsection'),
                  detailCode = urlParams.get('detail');

            if (!brandCode || !modelCode || !sectionCode || !detailCode) {
                document.getElementById('error-message').textContent = 'Could not load vehicle data. Missing parameters in URL.';
                document.getElementById('error-message').style.display = 'block';
                return;
            }

            try {
                const resolved = await resolvePartsFilesForSelection();

                if (!resolved.files || !resolved.files.length) {
                    throw new Error('No parts files linked to this heading.');
                }

                if (resolved.mode === 'grouped') {
                    const groupedParts = [];
                    const flatParts = [];

                    for (const file of resolved.files) {
                        const fileSegment = subsectionCode
                            ? `${sectionCode}_${subsectionCode}_${file.code}`
                            : `${sectionCode}_${file.code}`;

                        const partsFile = `data/brands/${brandCode}/${modelCode}/parts_${fileSegment}.json`;
                        const parts = await readDataJson(partsFile);

                        groupedParts.push({
                            groupTitle: file.name || file.code,
                            parts: parts
                        });

                        flatParts.push(...parts);
                    }

                    window.currentPartsData = flatParts;
                    renderPartsTable(groupedParts);
                    renderCallouts(flatParts);
                    requestAnimationFrame(highlightFromUrl);
                    return;
                }

                const partsArrays = await Promise.all(
                    resolved.files.map(async file => {
                        const code = typeof file === 'string' ? file : file.code;
                        const fileSegment = subsectionCode
                            ? `${sectionCode}_${subsectionCode}_${code}`
                            : `${sectionCode}_${code}`;
                        const partsFile = `data/brands/${brandCode}/${modelCode}/parts_${fileSegment}.json`;
                        return await readDataJson(partsFile);
                    })
                );

                const partsData = partsArrays.flat();
                window.currentPartsData = partsData;
                renderPartsTable(partsData);
                renderCallouts(partsData);
                requestAnimationFrame(highlightFromUrl);

            } catch (error) {
                document.getElementById('error-message').textContent = `Error: ${error.message}`;
                document.getElementById('error-message').style.display = 'block';
            }
        }

async function setDiagramImage() {
    const brandCode = urlParams.get('brand');
    const modelCode = urlParams.get('model');
    const sectionCode = urlParams.get('section');
    const subsectionCode = urlParams.get('subsection');
    const detailCode = urlParams.get('detail');

    if (!brandCode || !modelCode || !sectionCode || !detailCode) return;

    try {
        // use the same resolution logic as the parts loader
        const resolved = await resolvePartsFilesForSelection();

        let imageDetailCode = detailCode;

        // if this is a grouped heading, use the first child file's code for the image
        if (resolved && resolved.mode === 'grouped' && resolved.files && resolved.files.length) {
            imageDetailCode = resolved.files[0].code;
        } else if (resolved && resolved.files && resolved.files.length) {
            imageDetailCode = resolved.files[0].code;
        }

        const diagramFileSegment = subsectionCode
            ? `${sectionCode}-${subsectionCode}-${imageDetailCode}`
            : `${sectionCode}-${imageDetailCode}`;

        const relPath = `data/brands/${brandCode}/${modelCode}/diagrams/${diagramFileSegment}.png`;

        if (isElectron() && window.api && window.api.readDataFile) {
            try {
                const base64 = await window.api.readDataFile(relPath, true);
                diagram.src = `data:image/png;base64,${base64}`;
            } catch (e) {
                document.getElementById('error-message').textContent =
                    `Could not load diagram image: ${diagramFileSegment}.png`;
                document.getElementById('error-message').style.display = 'block';
            }
        } else {
            diagram.src = `${rootPath}${relPath}`;
        }
    } catch (error) {
        document.getElementById('error-message').textContent =
            `Could not resolve diagram image: ${error.message}`;
        document.getElementById('error-message').style.display = 'block';
    }
}

        if (diagram) {
            diagram.onload = () => {
                scale = 1;
                panX = 0;
                panY = 0;
                applyTransform();
                loadPartsAndDiagram();
            };

            diagram.onerror = () => {
                if (!diagram.src.startsWith('data:image/png;base64,')) {
                    document.getElementById('error-message').textContent = 'Could not load diagram image.';
                    document.getElementById('error-message').style.display = 'block';
                }
            };

            setDiagramImage();
        }

        if (diagramWrapper) {
            diagramWrapper.addEventListener('mousedown', e => {
                isDragging = true;
                diagramWrapper.classList.add("dragging");
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    diagramWrapper.classList.remove("dragging");
                }
            });

            window.addEventListener('mousemove', e => {
                if (!isDragging) return;
                panX += e.clientX - lastMouseX;
                panY += e.clientY - lastMouseY;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                applyTransform();
            });

            diagramWrapper.addEventListener('wheel', e => {
                e.preventDefault();
                const zoomSpeed = 0.1;
                let newScale = scale * (e.deltaY < 0 ? 1 + zoomSpeed : 1 - zoomSpeed);
                newScale = clamp(newScale, 0.2, 5);

                const rect = diagramContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const xRel = (mouseX - panX) / scale;
                const yRel = (mouseY - panY) / scale;

                panX = mouseX - xRel * newScale;
                panY = mouseY - yRel * newScale;
                scale = newScale;
                applyTransform();
            }, { passive: false });
        }

        document.getElementById('zoom-in').onclick = () => {
            scale = Math.min(scale + 0.2, 5);
            applyTransform();
        };
        document.getElementById('zoom-out').onclick = () => {
            scale = Math.max(scale - 0.2, 0.2);
            applyTransform();
        };
        document.getElementById('reset').onclick = () => {
            scale = 1;
            panX = 0;
            panY = 0;
            applyTransform();
        };

        window.addEventListener('resize', () => {
            applyTransform();
            if (window.currentPartsData) renderCallouts(window.currentPartsData);
        });
    }

    (function() {
        const breadcrumbEl = document.getElementById('epc-breadcrumb');
        if (!breadcrumbEl) return;

        const urlParams = new URLSearchParams(window.location.search);
        const brandCode = urlParams.get('brand');
        const modelCode = urlParams.get('model');
        const sectionCode = urlParams.get('section');
        const subsectionCode = urlParams.get('subsection');
        const detailCode = urlParams.get('detail');

        if (!brandCode || !modelCode) return;

        let detailsListFile = null;
        if (detailCode && sectionCode) {
            const detailsFileSegment = subsectionCode ? `${sectionCode}_${subsectionCode}` : sectionCode;
            detailsListFile = `data/brands/${brandCode}/${modelCode}/details_${detailsFileSegment}.json`;
        }

        Promise.all([
            readDataJson('data/brands.json'),
            readDataJson(`data/brands/${brandCode}/models.json`),
            readDataJson(`data/brands/${brandCode}/${modelCode}/sections.json`),
            subsectionCode ? readDataJson(`data/brands/${brandCode}/${modelCode}/subsections_${sectionCode}.json`) : Promise.resolve(null),
            detailsListFile ? readDataJson(detailsListFile) : Promise.resolve(null)
        ]).then(([brands, modelsData, sections, subsections, detailsList]) => {
            const brand = brands?.find(b => b.code.toLowerCase() === brandCode);
            const model = modelsData ? modelsData[brandCode]?.find(m => m.code.toLowerCase() === modelCode) : null;
            const section = sections?.find(s => s.code === sectionCode);
            const subsection = subsections?.find(s => s.code === subsectionCode);
            const detail = detailsList?.find(d => d.code === detailCode);

            const homeUrl = getRootPath() + (isElectron() ? 'app-home.html' : 'index.html');

            breadcrumbEl.innerHTML = `<li class="breadcrumb-item"><a href="${homeUrl}">EPC</a></li>`;
            if (brand) breadcrumbEl.innerHTML += `<li class="breadcrumb-item"><a href="${getRootPath()}index.html">${brand.name}</a></li>`;
            if (model) breadcrumbEl.innerHTML += `<li class="breadcrumb-item"><a href="${getRootPath()}index.html">${model.name}</a></li>`;
            if (section) {
                const url = `${getRootPath()}epc/epc.html?brand=${brandCode}&model=${modelCode}&section=${sectionCode}&highlight=${sectionCode}`;
                breadcrumbEl.innerHTML += `<li class="breadcrumb-item"><a href="${url}">${section.name}</a></li>`;
            }
            if (subsection) {
                const url = `${getRootPath()}epc/epc.html?brand=${brandCode}&model=${modelCode}&section=${sectionCode}&subsection=${subsectionCode}&highlight=${subsectionCode}`;
                breadcrumbEl.innerHTML += `<li class="breadcrumb-item"><a href="${url}">${subsection.name}</a></li>`;
            }
            if (detail) {
                breadcrumbEl.innerHTML += `<li class="breadcrumb-item active" aria-current="page">${detail.name}</li>`;
            }

            breadcrumbEl.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = this.href;
                });
            });
        }).catch(err => console.error("Error building breadcrumb:", err));
    })();

    const DOWNLOAD_ROOT = "downloads";
    const REMOTE_URL = "https://servicevault.xyz/downloads/";
    let allBrandsWithModels = [];

    function fileName(brand, model, type) {
        const fileType = type === 'manual' ? 'manuals' : 'epc';
        return `${brand.toLowerCase()}_${model.toLowerCase()}_${fileType}.zip`;
    }

    async function fileExistsLocally(brand, model, type) {
        if (!isElectron() || !window.api || !window.api.checkFileExists) return false;
        const marker = `data/brands/${brand}/${model}/.unzipped_ok`;
        if (!await window.api.checkFileExists(marker)) return false;
        if (type === "manuals") return await window.api.checkFileExists(`data/brands/${brand}/${model}/manual`);
        if (type === "epc") {
            const sectionsJson = `data/brands/${brand}/${model}/sections.json`;
            const diagramsFolder = `data/brands/${brand}/${model}/diagrams`;
            return (await window.api.checkFileExists(sectionsJson)) || (await window.api.checkFileExists(diagramsFolder));
        }
        return false;
    }

    async function fileExistsRemotely(brand, model, type) {
        const url = REMOTE_URL + fileName(brand, model, type);
        try {
            const resp = await fetch(url, { method: "HEAD" });
            return resp.ok;
        } catch {
            return false;
        }
    }

    async function downloadFile(brand, model, type, btn) {
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Downloading...`;

        const zipFile = fileName(brand, model, type);
        const zipPath = `${DOWNLOAD_ROOT}/${zipFile}`;
        const url = REMOTE_URL + zipFile;
        const marker = `data/brands/${brand}/${model}/.unzipped_ok`;
        const brandDataFolder = `data/brands/${brand}/`;

        if (window.api?.checkFileExists && window.api?.deleteFolder) {
            if (await window.api.checkFileExists(`data/brands/${brand}/${model}/`) && !await window.api.checkFileExists(marker)) {
                await window.api.deleteFolder(`data/brands/${brand}/${model}/`);
            }
        }

        if (window.api?.onFileDownloadProgress) {
            window.api.onFileDownloadProgress(data => {
                if (data.dest === zipPath) {
                    let speedStr = "", etaStr = "";
                    if (data.speed > 0) speedStr = data.speed > 1024 * 1024 ? (data.speed / 1024 / 1024).toFixed(2) + " MB/s" : (data.speed / 1024).toFixed(0) + " KB/s";
                    if (data.eta > 0 && isFinite(data.eta)) {
                        let sec = Math.round(data.eta);
                        etaStr = sec > 90 ? Math.round(sec / 60) + " min" : sec + "s";
                    }
                    btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Downloading... <span class="text-info">${data.percent}%</span> ${speedStr ? `<span class="text-muted" style="font-size:0.94em;">${speedStr}</span>` : ""} ${etaStr ? `<span class="text-warning" style="font-size:0.94em;">${etaStr} left</span>` : ""}`;
                }
            });
        }

        try {
            if (window.api?.downloadFile && window.api?.unzipFile && window.api?.writeFile) {
                await window.api.downloadFile(url, zipPath);
                btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Unzipping...`;
                await window.api.unzipFile(zipPath, brandDataFolder);
                await window.api.writeFile(marker, "OK");
                btn.innerHTML = "Redownload";
                btn.classList.remove("btn-outline-primary", "btn-outline-warning");
                btn.classList.add("btn-success");
                btn.disabled = false;
            } else {
                window.open(url, "_blank");
                btn.textContent = "Download";
                btn.disabled = false;
            }
        } catch (error) {
            btn.textContent = "Download";
            btn.disabled = false;
            alert("Error downloading or unzipping file. " + error.message);
        }
    }

    async function loadBrandModelsAccordion(filter = "") {
        const accordion = document.getElementById('brandsAccordion');
        accordion.innerHTML = '<div class="text-center text-secondary py-3">Loading...</div>';
        allBrandsWithModels = [];

        try {
            const brands = await (await fetch(getRootPath() + 'data/brands.json')).json();
            for (const brand of brands.sort((a, b) => a.name.localeCompare(b.name))) {
                try {
                    const modelsData = await (await fetch(`${getRootPath()}data/brands/${brand.code.toLowerCase()}/models.json`)).json();
                    allBrandsWithModels.push({
                        brand: brand.code.toLowerCase(),
                        brandName: brand.name,
                        models: modelsData[brand.code.toLowerCase()] || []
                    });
                } catch {}
            }
            renderAccordion(filter);
        } catch (err) {
            accordion.innerHTML = `<div class="text-danger text-center py-3">${err.message}</div>`;
        }
    }

    function renderAccordion(filter = "") {
        const accordion = document.getElementById('brandsAccordion');
        const filterLower = filter.toLowerCase();

        let filteredData = allBrandsWithModels.map(b => ({
            ...b,
            models: filter ? b.models.filter(m => b.brandName.toLowerCase().includes(filterLower) || m.name.toLowerCase().includes(filterLower)) : b.models,
        })).filter(b => b.models.length > 0);

        if (filteredData.length === 0) {
            accordion.innerHTML = '<div class="text-muted text-center py-3">No models found.</div>';
            return;
        }

        accordion.innerHTML = filteredData.map((brand, i) => `
            <div class="accordion-item">
                <h2 class="accordion-header" id="heading${i}">
                    <button class="accordion-button ${i > 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${i}">
                        ${brand.brandName}
                    </button>
                </h2>
                <div id="collapse${i}" class="accordion-collapse collapse ${i === 0 ? 'show' : ''}" data-bs-parent="#brandsAccordion">
                    <div class="accordion-body p-0">
                        <table class="table table-striped align-middle mb-0">
                            <thead><tr><th>Model</th><th>Manual</th><th>Parts</th></tr></thead>
                            <tbody>
                                ${brand.models.sort((a,b)=>a.name.localeCompare(b.name)).map(model => `
                                    <tr>
                                        <td>${model.name}</td>
                                        <td>${model.servicemanual ? `<button class="btn btn-sm btn-outline-primary download-btn" data-brand="${brand.brand}" data-model="${model.code.toLowerCase()}" data-type="manual">Download</button>` : `<span class="text-muted">—</span>`}</td>
                                        <td>${model.epc ? `<button class="btn btn-sm btn-outline-warning download-btn" data-brand="${brand.brand}" data-model="${model.code.toLowerCase()}" data-type="epc">Download</button>` : `<span class="text-muted">—</span>`}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `).join('');

        filteredData.forEach(brand => {
            brand.models.forEach(async model => {
                if (model.servicemanual) {
                    const btn = accordion.querySelector(`.download-btn[data-model="${model.code.toLowerCase()}"][data-type="manual"]`);
                    if (btn) {
                        if (await fileExistsLocally(brand.brand, model.code, "manuals")) {
                            btn.innerHTML = "Redownload";
                            btn.classList.replace("btn-outline-primary", "btn-success");
                        } else if (!(await fileExistsRemotely(brand.brand, model.code, "manuals"))) {
                            btn.textContent = "Not found";
                            btn.classList.replace("btn-outline-primary", "btn-outline-secondary");
                            btn.disabled = true;
                        }
                    }
                }
                if (model.epc) {
                    const btn = accordion.querySelector(`.download-btn[data-model="${model.code.toLowerCase()}"][data-type="epc"]`);
                    if (btn) {
                        if (await fileExistsLocally(brand.brand, model.code, "epc")) {
                            btn.innerHTML = "Redownload";
                            btn.classList.replace("btn-outline-warning", "btn-success");
                        } else if (!(await fileExistsRemotely(brand.brand, model.code, "epc"))) {
                            btn.textContent = "Not found";
                            btn.classList.replace("btn-outline-warning", "btn-outline-secondary");
                            btn.disabled = true;
                        }
                    }
                }
            });
        });
    }

    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const brandCode = urlParams.get('brand');
        const logoEl = document.getElementById('model-logo');
        if (!brandCode || !logoEl) return;

        const useFallback = (el, fallbackSrc) => {
            el.onerror = null;
            el.src = fallbackSrc;
            el.onerror = () => el.style.display = 'none';
        };

        fetch(getRootPath() + 'data/brands.json')
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(brands => {
                const brandObj = brands.find(b => b.code.toLowerCase() === brandCode.toLowerCase());
                let logoUrl = brandObj?.logo;
                if (logoUrl) {
                    logoEl.src = logoUrl;
                    logoEl.style.display = 'block';
                    logoEl.onerror = () => useFallback(logoEl, getRootPath() + `data/brands/${brandCode.toLowerCase()}/logo.svg`);
                    if (brandObj.invertInDark) logoEl.setAttribute('data-invert-in-dark', 'true');
                } else {
                    useFallback(logoEl, getRootPath() + `data/brands/${brandCode.toLowerCase()}/logo.svg`);
                }
            })
            .catch(() => {
                useFallback(logoEl, getRootPath() + `data/brands/${brandCode.toLowerCase()}/logo.svg`);
            });
    })();

    setTheme(localStorage.getItem('theme') || 'dark');
    initializeDiagramPage();

    document.getElementById('theme-toggle').addEventListener('click', () => {
        setTheme(document.body.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark');
    });

    document.getElementById('epc-home-btn').addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = getRootPath() + (isElectron() ? 'app-home.html' : 'index.html');
    });

    const settingsToggle = document.getElementById('settings-toggle');
    if (settingsToggle) {
        if (isElectron()) settingsToggle.style.display = 'flex';
        settingsToggle.addEventListener('click', (e) => {
            e.preventDefault();
            bootstrap.Modal.getOrCreateInstance(document.getElementById('settingsModal')).show();
            loadBrandModelsAccordion();
        });
    }

    document.getElementById('model-search').addEventListener('input', (e) => renderAccordion(e.target.value));
    document.getElementById('clear-model-search').addEventListener('click', () => {
        document.getElementById('model-search').value = "";
        renderAccordion("");
    });

    document.getElementById('brandsAccordion').addEventListener('click', async (e) => {
        if (!e.target.classList.contains('download-btn')) return;
        await downloadFile(e.target.dataset.brand, e.target.dataset.model, e.target.dataset.type, e.target);
    });
});
</script>
