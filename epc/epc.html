<style>
:root {
  --bg: #f4f4f9;
  --text: #121212;
  --brand-card: #fff;
  --brand-card-hover: #e0f0ff;
  --table-header: #003366;
  --table-header-text: #fff;
  --model-hover: #e0f0ff;
  --selected-model: #c0dafd;
  --breadcrumb-bg: #e9ecef;
  --breadcrumb: #003366;
  --box-shadow: 0 0 8px rgba(0,0,0,0.05);
  --border: #dee2e6;
  --text-btn: #6c757d;
}

/* LIGHT THEME VARIABLES */
body[data-bs-theme="light"] {
  --bs-body-bg: #f4f4f9;
  --bs-body-color: #121212;
  --bs-border-color: #dee2e6;
  --bs-primary: #c0dafd;
  --bs-primary-rgb: 192, 218, 253;
  --bs-secondary-bg: #e9ecef;
  --bs-tertiary-bg: #fff;
  --bs-table-bg: transparent;
  --bs-table-color: #121212;
  --bs-table-border-color: #dee2e6;
  --bs-table-hover-bg: #e0f0ff;
}

/* DARK THEME VARIABLES */
body[data-bs-theme="dark"] {
--test: #888888;
  --bs-body-bg: #212529;
  --bs-body-color: #dee2e6;
  --bs-border-color: #495057;
  --bs-primary: #38507c;
  --bs-primary-rgb: 56, 80, 124;
  --bs-secondary-bg: #495057;
  --bs-tertiary-bg: #181818;
  --bs-toggle-bg: #212529;
  --bs-table-bg: #212529;
  --bs-table-color: #dee2e6;
  --bs-table-border-color: #495057;
  --bs-table-hover-bg: #2c3545;
}

/* GENERAL LAYOUT */
html, body {
  height: 100%;
  width: 100vw;
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  background: var(--bs-body-bg);
  color: var(--bs-body-color);
  transition: background-color 0.3s;
}
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  box-sizing: border-box;
}

/* HEADER */
.epc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  flex-shrink: 0;
}
.epc-header-left {
  display: flex;
  align-items: center;
  gap: 0.9rem;
}
.epc-header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  margin: 0;
  color: var(--bs-body-color);
}
.epc-header-actions {
  display: flex;
  align-items: center;
  gap: 0.7rem;
}
.epc-header-home {
  display: inline-block;
  padding: 0.6rem 1.4rem;
  font-size: 1.14rem;
  font-weight: 600;
  color: var(--text-btn);
  border: 1.5px solid var(--bs-border-color);
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.18s, color 0.18s, border 0.18s;
}
.epc-header-home:hover {
  color: #007bff;
  border-color: #007bff;
}
.epc-theme-toggle {
  background: var(--bs-toggle-bg);
  border: 1.5px solid var(--bs-border-color);
  border-radius: 50%;
  cursor: pointer;
  width: 44px;
  height: 44px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: var(--text-btn);
  font-size: 1.2rem;
}

/* BREADCRUMB */
.breadcrumb {
  display: flex;
  flex-wrap: wrap;
  padding: 0.5rem 1rem;
  list-style: none;
  background-color: var(--bs-secondary-bg);
  border-radius: 0.25rem;
  font-size: 0.9rem;
  color: var(--breadcrumb);
  margin: 0 1.5rem 1rem 1.5rem;
}
.breadcrumb-item + .breadcrumb-item::before {
  content: "›";
  padding: 0 0.5rem;
  color: #6c757d;
  font-weight: 700;
  font-size: 1rem;
}
.breadcrumb-item a {
  color: var(--breadcrumb);
  text-decoration: none;
}
.breadcrumb-item a:hover {
  text-decoration: underline;
}
.breadcrumb-item.active {
  font-weight: 600;
}

/* LIST PANEL */
.container, .epc-main-content {
  display: flex;
  gap: 1rem;
  padding: 0 1.5rem 1.5rem 1.5rem;
  flex-grow: 1;
  min-height: 0;
  box-sizing: border-box;
  width: 100%;
  max-width: 100%;
  margin: 0;
}
.list-container {
  background: var(--bs-tertiary-bg);
  border-radius: 8px;
  padding: 1rem;
  flex: 1 1 0px;
  min-width: 0;
  overflow-y: auto;
  border: 1px solid var(--bs-border-color);
  display: flex;
  flex-direction: column;
}
.list-container h2 {
  margin-top: 0;
  margin-bottom: 1rem;
  font-size: 1.2rem;
  border-bottom: 2px solid var(--table-header);
  padding-bottom: 0.3rem;
  flex-shrink: 0;
  color: var(--bs-body-color);
}
.list-container ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.list-container ul li {
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid var(--bs-border-color);
  cursor: pointer;
  border-radius: 4px;
  transition: background-color 0.2s, color 0.2s;
  color: var(--breadcrumb);
}
.list-container ul li:hover {
  background-color: var(--model-hover);
}
.list-container ul li.selected {
  background-color: var(--selected-model) !important;
  font-weight: bold;
  color: var(--breadcrumb);
}

/* MODAL STYLES (MATCHED) */
#settingsModal .modal-content {
  background-color: var(--bs-body-bg);
  color: var(--bs-body-color);
  border: 1px solid var(--bs-border-color);
}
#settingsModal .modal-header,
#settingsModal .modal-footer {
  border-color: var(--bs-border-color);
}
#settingsModal .accordion-item {
  background-color: transparent;
  border-color: var(--bs-border-color);
}
#settingsModal .accordion-button {
  background-color: var(--bs-tertiary-bg);
  color: var(--bs-body-color);
  font-weight: 600;
}
#settingsModal .accordion-button:not(.collapsed) {
  background-color: var(--bs-primary);
  color: white;
}
#settingsModal .accordion-button:focus {
  box-shadow: 0 0 0 0.25rem rgba(var(--bs-primary-rgb), 0.5);
}
#settingsModal .table {
  --bs-table-color: var(--bs-body-color);
  --bs-table-bg: var(--bs-body-bg);
  --bs-table-border-color: var(--bs-border-color);
  --bs-table-striped-bg: rgba(0, 0, 0, 0.05);
  --bs-table-hover-bg: rgba(0, 0, 0, 0.075);
  margin-bottom: 0;
}
#settingsModal #model-search {
  background-color: var(--bs-tertiary-bg);
  color: var(--bs-body-color);
  border-color: var(--bs-border-color);
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .container, .epc-main-content {
    flex-direction: column !important;
    gap: 0.6rem !important;
    padding: 0.6rem !important;
    width: 100vw !important;
    max-width: 100vw !important;
  }
  .list-container {
    width: 100% !important;
    max-width: 100% !important;
    margin-bottom: 0.7rem;
    flex-basis: auto !important;
    padding: 0.6rem 0.4rem !important;
  }
  .list-container h2 {
    font-size: 1.12rem !important;
    margin-bottom: 0.3rem !important;
  }
  .list-container ul {
    max-height: 210px;
    overflow-y: auto;
    padding-bottom: 0.3rem;
  }
  .list-container ul li {
    min-height: 42px;
    font-size: 1rem;
    padding: 0.57em 0.7em;
    margin-bottom: 0.13em;
    white-space: normal;
    word-break: break-word;
    line-height: 1.2;
  }
}
@media (max-width: 600px) {
  .epc-header h1 { font-size: 1.01rem; }
  .list-container h2 { font-size: 0.98rem !important; }
  .breadcrumb { font-size: 0.93rem; }
  .epc-header-home,
  #theme-toggle,
  #settings-toggle {
    padding: 0.1rem 0.2rem;
    font-size: 0.91rem;
  }
}
/* DARK MODE LIST STYLES TO MATCH INDEX & DIAGRAM */
body[data-bs-theme="dark"] .list-container ul li {
  color: #eaf1ff !important;
  border-bottom-color: #495057;
  background-color: transparent !important;
}

body[data-bs-theme="dark"] #details-list li[style*="opacity: 0.88"] {
  color: #cfd8ea !important;
}




body[data-bs-theme="dark"] .list-container ul li:hover {
  background-color: #25344a !important;
  color: #ffffff !important;
}

body[data-bs-theme="dark"] .list-container ul li.selected {
  background-color: #38507c !important;
  color: #ffffff !important;
  font-weight: bold;
}
/* --- Breadcrumb Consistency in DARK MODE --- */
body[data-bs-theme="dark"] .breadcrumb {
  background-color: #495057 !important;
  color: #c7d7ef !important;
}

body[data-bs-theme="dark"] .breadcrumb-item a {
  color: #c7d7ef !important;
  text-decoration: none;
}

body[data-bs-theme="dark"] .breadcrumb-item a:hover {
  text-decoration: underline;
}

body[data-bs-theme="dark"] .breadcrumb-item + .breadcrumb-item::before {
  color: #adb5bd !important;
}

body[data-bs-theme="dark"] .breadcrumb-item.active {
  color: #dee2e6 !important;
  font-weight: 600;
}

import { initEPCApp } from './js/epcApp.js?v=23';

// --- ROBUST DATA READING FUNCTION ---
async function readDataJson(relPath) {
  const isElectron = () => navigator.userAgent.toLowerCase().indexOf(' electron/') > -1;
  const getRootPath = () => window.location.pathname.includes('/epc/') ? '../' : './';

  if (isElectron() && window.api && typeof window.api.readDataFile === 'function') {
    try {
      const content = await window.api.readDataFile(relPath);
      return JSON.parse(content);
    } catch (error) {
      console.error(`Electron: Local file read failed for ${relPath}.`, error);
      throw new Error(`Local file not found: ${relPath}`);
    }
  } else {
    try {
        const response = await fetch(getRootPath() + relPath);
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status} for ${relPath}`);
        }
        return await response.json();
    } catch (error) {
        console.error(`Web: Could not fetch file ${relPath}.`, error);
        throw new Error(`Failed to fetch from web host: ${relPath}`);
    }
  }
}

// --- Helpers and Theme ---
function isElectron() { return navigator.userAgent.toLowerCase().indexOf(' electron/') > -1; }
function getRootPath() { 
  if (window.location.pathname.includes('/epc/')) { return '../'; } 
  return './'; 
}
function setTheme(theme) {
  document.body.setAttribute('data-bs-theme', theme);
  localStorage.setItem('theme', theme);
  updateThemeIcon();
}
function updateThemeIcon() {
  document.querySelectorAll('#theme-toggle').forEach(btn => {
    const moon = btn.querySelector('.moon-icon');
    const sun = btn.querySelector('.sun-icon');
    if (!moon || !sun) return;
    if (document.body.getAttribute('data-bs-theme') === 'dark') {
      sun.style.display = 'none'; moon.style.display = '';
    } else {
      sun.style.display = ''; moon.style.display = 'none';
    }
  });
}

async function fileExistsLocally(brand, model, type) {
  if (!window.api || !window.api.checkFileExists) return false;
  const marker = `data/brands/${brand}/${model}/.unzipped_ok`;

  } else if (type === "epc") {
    const sectionsJson = `data/brands/${brand}/${model}/sections.json`;
    const diagramsFolder = `data/brands/${brand}/${model}/diagrams`;
    return (await window.api.checkFileExists(sectionsJson)) || (await window.api.checkFileExists(diagramsFolder));
  }
  return false;
}
async function fileExistsRemotely(brand, model, type) {
  const url = REMOTE_URL + fileName(brand, model, type);
  try { const resp = await fetch(url, { method: "HEAD" }); return resp.ok; } catch { return false; }
}
async function downloadFile(brand, model, type, btn) {
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Downloading...`;
  const zipFile = fileName(brand, model, type === 'manual' ? 'manuals' : 'epc');
  const zipPath = `${DOWNLOAD_ROOT}/${zipFile}`;
  const url = REMOTE_URL + zipFile;
  const brandDataFolder = `data/brands/${brand}/`;
  const marker = `data/brands/${brand}/${model}/.unzipped_ok`;
  if (window.api && window.api.checkFileExists && window.api.deleteFolder) {
    if (await window.api.checkFileExists(`data/brands/${brand}/${model}/`) &&
        !await window.api.checkFileExists(marker)) {
      await window.api.deleteFolder(`data/brands/${brand}/${model}/`);
    }
  }
  let progressHandler;
  if (window.api && window.api.onFileDownloadProgress) {
    progressHandler = data => {
      if (data.dest === zipPath) {
        let speedStr = "", etaStr = "";
        if (data.speed > 0) speedStr = data.speed > 1024 * 1024 ? (data.speed / 1024 / 1024).toFixed(2) + " MB/s" : (data.speed / 1024).toFixed(0) + " KB/s";
        if (data.eta > 0 && isFinite(data.eta)) { let sec = Math.round(data.eta); etaStr = sec > 90 ? Math.round(sec / 60) + " min" : sec + "s"; }
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Downloading... <span class="text-info">${data.percent}%</span> ${speedStr ? `<span class="text-muted" style="font-size:0.94em;">${speedStr}</span>` : ""} ${etaStr ? `<span class="text-warning" style="font-size:0.94em;">${etaStr} left</span>` : ""}`;
      }
    };
    window.api.onFileDownloadProgress(progressHandler);
  }
  try {
    if (window.api && window.api.downloadFile && window.api.unzipFile && window.api.writeFile) {
      await window.api.downloadFile(url, zipPath);
      btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Unzipping...`;
      await window.api.unzipFile(zipPath, brandDataFolder);
      await window.api.writeFile(marker, "OK");
      btn.innerHTML = "Redownload";
      btn.classList.remove("btn-outline-primary", "btn-outline-warning");
      btn.classList.add("btn-success");
      btn.disabled = false;
    } else {
      window.open(url, "_blank");
      btn.textContent = "Download";
      btn.disabled = false;
    }
  } catch (error) {
    btn.textContent = "Download";
    btn.disabled = false;
    alert("Error downloading or unzipping file. Try again later.");
  }
}
let allBrandsWithModels = [];
async function loadBrandModelsAccordion(filter = "") {
  const accordion = document.getElementById('brandsAccordion');
  accordion.innerHTML = '<div class="text-center text-secondary py-3">Loading...</div>';
  allBrandsWithModels = [];
  try {
    const brands = await readDataJson('data/brands.json');
    brands.sort((a, b) => a.name.localeCompare(b.name));
    for (const brand of brands) {
      try {
        const modelsData = await readDataJson(`data/brands/${brand.code.toLowerCase()}/models.json`);
        let models = (modelsData[brand.code.toLowerCase()] || []).slice().sort((a, b) => a.name.localeCompare(b.name));
        allBrandsWithModels.push({ brand: brand.code.toLowerCase(), brandName: brand.name, models: models });
      } catch (err) { }
    }
    renderAccordion(filter);
  } catch (err) {
    accordion.innerHTML = '<div class="text-danger text-center py-3">Failed to load brands or models.</div>';
  }
}
function renderAccordion(filter = "") {
  const accordion = document.getElementById('brandsAccordion');
  accordion.innerHTML = "";
  let filteredBrands = allBrandsWithModels.map(b => ({
    ...b,
    models: filter ? b.models.filter(m => b.brandName.toLowerCase().includes(filter.toLowerCase()) || m.name.toLowerCase().includes(filter.toLowerCase())) : b.models
  })).filter(b => b.models.length);
  if (!filteredBrands.length) {
    accordion.innerHTML = '<div class="text-muted text-center py-3">No models found.</div>';
    return;
  }
  filteredBrands.forEach((brand, i) => {
    const card = document.createElement('div');
    card.className = 'accordion-item';
    card.innerHTML = `<h2 class="accordion-header" id="heading${i}"><button class="accordion-button ${i > 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${i}">${brand.brandName}</button></h2><div id="collapse${i}" class="accordion-collapse collapse ${i === 0 ? 'show' : ''}" data-bs-parent="#brandsAccordion"><div class="accordion-body" style="padding:0;"><table class="table table-striped align-middle mb-0"><thead><tr><th>Model</th><th>Manual</th><th>Parts</th></tr></thead><tbody>${brand.models.map(model => `<tr><td>${model.name}</td><td>${model.servicemanual ? `<button class="btn btn-sm btn-outline-primary download-btn" data-brand="${brand.brand}" data-model="${model.code.toLowerCase()}" data-type="manual">Download</button>` : '<span class="text-muted">—</span>'}</td><td>${model.epc ? `<button class="btn btn-sm btn-outline-warning download-btn" data-brand="${brand.brand}" data-model="${model.code.toLowerCase()}" data-type="epc">Download</button>` : '<span class="text-muted">—</span>'}</td></tr>`).join("")}</tbody></table></div></div>`;
    accordion.appendChild(card);
    setTimeout(() => {
      brand.models.forEach(async (model) => {
        if (model.servicemanual) {
          const btn = card.querySelector(`.download-btn[data-model="${model.code.toLowerCase()}"][data-type="manual"]`);
          if (btn) {
            if (await fileExistsLocally(brand.brand, model.code, "manuals")) {
              btn.innerHTML = "Redownload"; btn.classList.remove("btn-outline-primary"); btn.classList.add("btn-success");
            } else if (!await fileExistsRemotely(brand.brand, model.code, "manuals")) {
              btn.textContent = "Not found"; btn.disabled = true;
            }
          }
        }
        if (model.epc) {
          const btn = card.querySelector(`.download-btn[data-model="${model.code.toLowerCase()}"][data-type="epc"]`);
          if (btn) {
            if (await fileExistsLocally(brand.brand, model.code, "epc")) {
              btn.innerHTML = "Redownload"; btn.classList.remove("btn-outline-warning"); btn.classList.add("btn-success");
            } else if (!await fileExistsRemotely(brand.brand, model.code, "epc")) {
              btn.textContent = "Not found"; btn.disabled = true;
            }
          }
        }
      });
    }, 0);
  });
}

function initializeEpcDetailPage() {
  const urlParams = new URLSearchParams(window.location.search);
  const brandCode = (urlParams.get('brand') || '').toLowerCase();
  const modelCode = (urlParams.get('model') || '').toLowerCase();
  const logoImg = document.getElementById('model-logo');
  const rootPath = getRootPath();

  if (isElectron()) {
    document.querySelectorAll('.electron-only').forEach(btn => btn.style.display = 'flex');
  }
  if (brandCode) {
    readDataJson('data/brands.json')
      .then(brands => {
        const brandData = brands.find(b => b.code.toLowerCase() === brandCode);
        if (brandData && logoImg) {
          let mainLogoSrc = brandData.logo.startsWith('http') ? brandData.logo : `${rootPath}${brandData.logo}`;
          let fallbackLogoSrc = `${rootPath}data/brands/${brandCode}/logo.svg`;
          logoImg.onerror = function() { this.onerror = null; this.src = fallbackLogoSrc; };
          logoImg.src = mainLogoSrc;
          logoImg.style.display = 'block';
          logoImg.alt = brandData.name + " Logo";
          if (brandData.invertInDark) logoImg.setAttribute('data-invert-in-dark', 'true');
        }
      });
  }
  initEPCApp({
    brandCode, modelCode, rootPath,
    breadcrumbEl: document.getElementById('epc-breadcrumb'),
    sectionsListEl: document.getElementById('sections-list'),
    subsectionsListEl: document.getElementById('subsections-list'),
    detailsListEl: document.getElementById('details-list'),
    errorMessageEl: document.getElementById('error-message'),
    mainContentEl: document.getElementById('main-content'),
    readDataJson,
  });
}

// --- Event Listeners ---
setTheme(localStorage.getItem('theme') || 'dark');
initializeEpcDetailPage();

document.body.addEventListener('click', function(e) {
    const homeLink = e.target.closest('.epc-header-home');
    const themeToggleButton = e.target.closest('#theme-toggle');
    const settingsButton = e.target.closest('#settings-toggle');
    if (homeLink) {
      e.preventDefault();
      window.location.href = getRootPath() + (isElectron() ? 'app-home.html' : 'index.html');
    }
    if (themeToggleButton) {
      const current = document.body.getAttribute('data-bs-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    }
    if (settingsButton) {
      e.preventDefault();
      const modal = new bootstrap.Modal(document.getElementById('settingsModal'));
      modal.show();
      loadBrandModelsAccordion();
    }
});
document.getElementById('model-search').addEventListener('input', (e) => renderAccordion(e.target.value));
document.getElementById('clear-model-search').addEventListener('click', () => { document.getElementById('model-search').value = ""; renderAccordion(""); });
document.getElementById('brandsAccordion').addEventListener('click', async (e) => {
  if (!e.target.classList.contains('download-btn')) return;
  const btn = e.target;
  await downloadFile(btn.dataset.brand, btn.dataset.model, btn.dataset.type, btn);
});
if (window.api && window.api.onFileDownloadProgress) {
  window.api.onFileDownloadProgress(data => {
    const filename = data.dest.split('/').pop();
    const match = filename.match(/([^_]+)_([^_]+)_([^.]+)\.zip$/);
    if (!match) return;
    const [, brand, model, type] = match;
    const selector = `.download-btn[data-brand="${brand}"][data-model="${model}"][data-type="${type.replace(/s$/, '')}"]`;
    const btn = document.querySelector(selector);
    if (btn) {
      btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Downloading... <span class="text-info">${Math.round(data.percent)}%</span>`;
    }
  });
}
