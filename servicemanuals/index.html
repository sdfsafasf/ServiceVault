<style>
    /* --- START: UNIFIED STYLESHEET (INDEX.HTML VERSION) --- */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
html {
  scrollbar-gutter: stable;
}
    /* 1. CORRECT CORE VARIABLES */
    :root {
      --bs-body-bg: #181c1f;
      --sv-card-color: #23272b;
      --bs-body-color: #f1f1f1;
      --sv-font-color-muted: #888888;
      --primary-accent: #007BFF;
      --bs-border-color: #2d3338;
    }
    [data-bs-theme="light"] {
      --bs-body-bg: #f4f4f9;
      --sv-card-color: #fff;
      --bs-body-color: #181c1f;
      --sv-font-color-muted: #5c6b7a;
      --bs-border-color: #dee2e6;
    }

    /* 2. GLOBAL LAYOUT (Full Page Scroll Base) */
    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bs-body-bg);
      color: var(--bs-body-color);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--bs-body-color);
      letter-spacing: 0.01em;
    }
    
    /* 3. LAYOUT MODIFICATION FOR INDEX.HTML SLIDER */
    main {
      flex: 1 1 auto;
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 3rem 1.5rem 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 0;
      position: relative;
      height: auto;
      transition: height 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    #brand-selection-container,
    #model-selection-container {
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.5s;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      padding: inherit;
      box-sizing: border-box;
      will-change: transform, opacity;
    }

    #brand-selection-container {
      transform: translateX(0);
      opacity: 1;
      z-index: 2;
      pointer-events: auto;
    }

    #model-selection-container {
      transform: translateX(100%);
      opacity: 0;
      z-index: 1;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    main.models-active #brand-selection-container {
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
    }

    main.models-active #model-selection-container {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
      z-index: 2;
    }
    /*--- END SLIDE LOGIC ---*/

    /* 4. ALL COMPONENT STYLES (Unified) */
    .page-title { font-size: 2.1rem; font-weight: 600; text-align: center; margin-bottom: 2.2rem; }
    .selection-grid { display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center; margin-bottom: 3rem; }
    .brand-card { background: var(--sv-card-color); border: 1px solid var(--bs-border-color); border-radius: 12px; padding: 2rem 2.2rem; text-align: center; cursor: pointer; min-width: 170px; max-width: 220px; transition: box-shadow 0.15s, transform 0.15s; box-shadow: 0 1px 8px rgba(0,0,0,0.10); }
    .brand-card:hover { transform: translateY(-5px) scale(1.03); box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
    .brand-card img { max-width: 90px; max-height: 90px; margin-bottom: 1.1rem; transition: filter 0.2s; }
    body:not(.light-mode) .invert-in-dark { filter: invert(1) brightness(1.08) !important; }
    body.light-mode .invert-in-dark { filter: none !important; }
    .brand-card h3 { font-size: 1.2rem; font-weight: 600; margin: 0; }
    .model-list { width: 100%; max-width: 450px; margin: 0 auto; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 1rem; }
    main .model-list li a { display: block; background: var(--sv-card-color); border: 1px solid var(--bs-border-color); color: var(--bs-body-color); text-decoration: none; font-size: 1.13rem; padding: 0.85rem 1.2rem; border-radius: 7px; transition: background 0.18s, color 0.18s, border-color 0.18s; }
    main .model-list li a:hover, main .model-list li.selected a { background-color: var(--primary-accent); color: #fff; border-color: var(--primary-accent); }
    #back-to-brands { display: inline-block; background: var(--sv-card-color); color: var(--sv-font-color-muted); border: 1px solid var(--bs-border-color); text-decoration: none; padding: 0.7rem 1.6rem; border-radius: 8px; font-weight: 600; font-size: 1.07rem; transition: color 0.2s, border-color 0.2s, background 0.2s; margin-bottom: 2.1rem; }
    #back-to-brands:hover { color: var(--primary-accent); border-color: var(--primary-accent); background: var(--bs-body-bg); }
    
    /* -- Correct Modal Styles -- */
    #modal-vehicle-list-container ul { list-style-type: none; padding-left: 0; column-count: 3; column-gap: 1.5rem; }
    @media (max-width: 992px) { #modal-vehicle-list-container ul { column-count: 2; } }
    @media (max-width: 768px) { #modal-vehicle-list-container ul { column-count: 1; } }
    #modal-vehicle-list-container li { break-inside: avoid; padding: 0.15rem 0; }
    #modal-vehicle-list-container a { color: var(--bs-body-color); text-decoration: none; transition: color 0.15s ease-in-out; display: inline-block; padding: 2px 0; }
    #modal-vehicle-list-container a:hover { color: var(--primary-accent); }
    #modal-vehicle-list-container h4 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--bs-border-color); }
    #modal-vehicle-list-container .brand-container:first-child h4 { margin-top: 0; }
    #modal-vehicle-list-container a span { margin-left: 6px; }
    #modal-vehicle-list-container a svg { width: 1em; height: 1em; vertical-align: -0.15em; }

    /* 5. FINAL OVERRIDES & THEME-SPECIFIC TWEAKS */
    .logo:hover { color: inherit !important; background: none !important; text-decoration: none !important; }
    body[data-bs-theme="light"] main .model-list li a:hover,
    body[data-bs-theme="light"] #back-to-brands:hover {
      color: var(--primary-accent) !important;
      background: var(--sv-card-color) !important;
      border-color: var(--primary-accent) !important;
    }
    @media (max-width: 1190px) {
      main {padding: 1.2rem 0.5rem;}
      .page-title {font-size: 1.3rem;}
      .selection-grid {gap: 1rem;}
      .brand-card {padding: 1rem 0.8rem; min-width: 120px; max-width: 100%;}
      .brand-card img {max-width: 60px; max-height: 60px;}
      main .model-list {max-width: 100%; gap: 0.7rem;}
      main .model-list li a {font-size: 1rem; padding: 0.7rem 0.9rem;}
    }
    body[data-bs-theme="light"] header a:not(.logo):hover,
    body[data-bs-theme="light"] footer a:not(.logo):hover {
        color: var(--primary-accent) !important;
    }
    #modal-vehicle-list-container a:hover {
      color: var(--primary-accent);
    }

    /* Settings ("gear") button consistent style */
    #settings-toggle.epc-theme-toggle {
      background: var(--sv-card-color);
      border: 1px solid var(--bs-border-color);
      border-radius: 50%;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.3s, border-color 0.3s, color 0.3s;
      font-size: 1.1rem;
      color: var(--sv-font-color-muted);
      padding: 0;
    }

    body[data-bs-theme="dark"] #settings-toggle {
      color: #888888;
    }
    body[data-bs-theme="light"] #settings-toggle {
      background: #fff;
      border-color: #dee2e6;
      color: #6c757d;
    }

    #settings-toggle svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    /* --- Style for the new Home button --- */
    .header-action-btn {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--sv-font-color-muted);
      background: none;
      border: 1px solid var(--bs-border-color);
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.18s, color 0.18s, border-color 0.18s;
    }

    .header-action-btn:hover {
      color: var(--primary-accent);
      border-color: var(--primary-accent);
      background-color: var(--sv-card-color);
      text-decoration: none !important;
      filter: none !important;
    }
</style>
</head>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // --- Part 1: Modal Setup and Control ---
  let vehicleModalInstance = null;
  const vehicleModalEl = document.getElementById('vehicleListModal');
  if (vehicleModalEl) {
    vehicleModalInstance = new bootstrap.Modal(vehicleModalEl);
  }

  // Vehicle List Modal events
  const searchInput = document.getElementById('modal-search-input');
  if (searchInput) {
    searchInput.addEventListener('input', function(e) {
      renderVehicleList('#modal-vehicle-list-container', e.target.value.trim().toLowerCase());
    });
  }
  const modalAZNav = document.querySelector('.modal-az-nav');
  if (modalAZNav) {
    modalAZNav.addEventListener('click', function(e) {
      if (e.target.tagName === 'A') {
        e.preventDefault();
        const id = e.target.getAttribute('href').slice(1);
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  }

  // --- Theme Logic & Helpers ---
  function isElectron() {
    return navigator.userAgent.toLowerCase().indexOf(' electron/') > -1;
  }
  function getIncludePath(filename) {
    let url = window.location.pathname;
    url = url.substring(0, url.lastIndexOf('/'));
    if (!url.endsWith('/')) url += '/';
    return url + '../' + filename;
  }
  function setTheme(theme) {
    document.body.setAttribute('data-bs-theme', theme);
    document.body.classList.toggle('light-mode', theme === 'light');
    localStorage.setItem('theme', theme);
    updateBrandLogoFilters();
    updateThemeIcon();
  }
  function updateThemeIcon() {
    document.querySelectorAll('#theme-toggle').forEach(btn => {
      const moon = btn.querySelector('.moon-icon');
      const sun = btn.querySelector('.sun-icon');
      if (!moon || !sun) return;
      if (document.body.getAttribute('data-bs-theme') === 'dark') {
        sun.style.display = 'none';
        moon.style.display = '';
      } else {
        sun.style.display = '';
        moon.style.display = 'none';
      }
    });
  }
  function updateBrandLogoFilters() {
    const isDark = document.body.getAttribute('data-bs-theme') === 'dark';
    document.querySelectorAll('.invert-in-dark').forEach(img => {
      img.style.filter = isDark ? 'invert(1) brightness(1.08)' : 'none';
    });
  }

  // --- Page Animation Logic (brand/model selector) ---
  const main = document.querySelector('main');
  const brandGrid = document.getElementById('brand-grid');
  const modelList = document.getElementById('model-list');
  const backBtn = document.getElementById('back-to-brands');
  const modelPageTitle = document.getElementById('model-page-title');

  function syncMainHeight() {
    const activePanel = main.classList.contains('models-active')
      ? document.getElementById('model-selection-container')
      : document.getElementById('brand-selection-container');

    if (!activePanel) return;

    requestAnimationFrame(() => {
      main.style.height = activePanel.scrollHeight + 'px';
    });
  }

  // Helper: List directories using Electron
  async function getDownloadedManualModels(brandCode) {
    if (window.api && window.api.listDir) {
      return (await window.api.listDir(`data/brands/${brandCode}/`)).map(x => x.toLowerCase());
    }
    return [];
  }

  async function loadBrands() {
    try {
      const response = await fetch('../data/brands.json');
      if (!response.ok) throw new Error('Network error loading brands.json');
      const brands = await response.json();

      let downloadedMap = {};
      if (window.api && window.api.listDir) {
        const downloaded = await window.api.getLocalBrandsModels();
        for (const item of downloaded) {
          downloadedMap[item.brand.toLowerCase()] = (item.models || [])
            .filter(m => m.hasManual)
            .map(m => (typeof m === 'string' ? m.toLowerCase() : m.code.toLowerCase()));
        }
      }

      brandGrid.innerHTML = '';

      const filteredBrands = brands.filter(b => {
        if (window.api && window.api.listDir) {
          return downloadedMap[b.code.toLowerCase()] && downloadedMap[b.code.toLowerCase()].length > 0;
        } else {
          return true;
        }
      });

      if (filteredBrands.length === 0) {
        brandGrid.innerHTML = `<div style="color:#8ca; font-size:1.12em; text-align:center; width:100%;"><b>No manuals downloaded yet.</b><br><span style="font-size:0.98em;">Get some from <b>Settings</b>.</span></div>`;
        syncMainHeight();
        return;
      }

      filteredBrands.forEach(brand => {
        const card = document.createElement('div');
        card.className = 'brand-card';
        card.innerHTML = `<img src="${brand.logo}" alt="${brand.name} Logo" ${brand.invertInDark ? 'class="invert-in-dark"' : ''}><h3>${brand.name}</h3>`;
        card.addEventListener('click', () => loadModels(brand.code.toLowerCase(), brand.name));
        brandGrid.appendChild(card);
      });

      updateBrandLogoFilters();
      syncMainHeight();
    } catch (error) {
      brandGrid.innerHTML = `<p>Error loading brands: ${error.message}</p>`;
      syncMainHeight();
    }
  }

  async function loadModels(brandCode, brandName) {
    modelPageTitle.textContent = `Select a ${brandName} Model`;
    main.classList.add('models-active');
    modelList.innerHTML = '<li><p>Loading models...</p></li>';
    syncMainHeight();

    try {
      const modelJsonPath = `../data/brands/${brandCode}/models.json`;
      const response = await fetch(modelJsonPath);
      if (!response.ok) throw new Error(`Could not find models file: ${modelJsonPath}`);
      const data = await response.json();

      let models = data[brandCode.toUpperCase()] || data[brandCode] || [];
      if (!Array.isArray(models)) throw new Error(`No models found for "${brandName}"`);

      let filteredModels;
      if (window.api && window.api.getLocalBrandsModels) {
        let manualMap = {};
        const downloaded = await window.api.getLocalBrandsModels();
        const found = downloaded.find(b => b.brand.toLowerCase() === brandCode.toLowerCase());
        if (found) {
          for (const m of found.models) {
            manualMap[m.code ? m.code.toLowerCase() : m.toLowerCase()] = m.hasManual !== undefined ? m.hasManual : true;
          }
        }
        filteredModels = models.filter(m => manualMap[m.code.toLowerCase()]);
      } else {
        filteredModels = models.filter(m => m.servicemanual);
      }

      modelList.innerHTML = '';

      if (filteredModels.length === 0) {
        modelList.innerHTML = `<li><p style="font-style:italic;">No models available.<br><span style="font-size:0.98em;color:#9ab;">You may need to download model data from <b>Settings</b>.</span></p></li>`;
        syncMainHeight();
        return;
      }

      filteredModels.forEach(model => {
        const li = document.createElement('li');
        const modelCodeLower = model.code.toLowerCase();
        const finalPath = `manual.html?brand=${brandCode}&model=${modelCodeLower}`;
        let icons = '';

        if (model.servicemanual) {
          icons += `<span title="Manual" style="margin-left:8px;"><svg style="width:1em;height:1em;fill:#198754;vertical-align:middle;" viewBox="0 0 24 24"><path d="M22.7 19.3c-.4.4-1 .4-1.4 0l-3-3-2.3 2.3c-.4-.4-1 .4-1.4 0l-7.3-7.3c-.4-.4-.4-1 0-1.4l2.3-2.3-3-3c-.4-.4-.4-1 0-1.4.4-.4 1-.4 1.4 0l3 3 2.3-2.3c.4-.4 1-.4 1.4 0l7.3 7.3c.4.4.4 1 0 1.4l-2.3 2.3 3 3c.4.4.4 1 0 1.4z"/></svg></span>`;
        }
        if (model.epc) {
          icons += `<span title="Parts Catalog" style="margin-left:5px;"><svg style="width:1em;height:1em;fill:#007bff;vertical-align:middle;" viewBox="0 0 24 24"><path d="M10.67,3.16a1,1,0,0,1,1.09-.09l8.38,5A1,1,0,0,1,21,8.91V19a3,3,0,0,1-3,3H6A3,3,0,0,1,3,19V8.91A1,1,0,0,1,4,8.07l8.38-5A1,1,0,0,1,10.67,3.16ZM12,5.13,5,9.09V19a1,1,0,0,0,1,1H18a1,1,0,0,0,1-1V9.09Z"/></svg></span>`;
        }
        li.innerHTML = `<a href="${finalPath}">${model.name}${icons}</a>`;
        modelList.appendChild(li);
      });

      syncMainHeight();
    } catch (error) {
      modelList.innerHTML = `<li><p>Error loading models: ${error.message}</p></li>`;
      syncMainHeight();
    }
  }

  backBtn.addEventListener('click', (e) => {
    e.preventDefault();
    main.classList.remove('models-active');

    if (brandGrid.childElementCount <= 1) {
      loadBrands();
    } else {
      syncMainHeight();
    }
  });

  // --- Global click handling (header nav logic) ---
  document.body.addEventListener('click', function(e) {
    const logoLink = e.target.closest('#servicevault-logo');
    const homeButton = e.target.closest('#header-home-btn');
    const vehicleListLink = e.target.closest('#open-vehicle-list');
    const themeToggleButton = e.target.closest('#theme-toggle');

    if (logoLink || homeButton) {
      e.preventDefault();
      window.location.href = isElectron() ? '../app-home.html' : '../index.html';
    }
    
    if (vehicleListLink) {
      e.preventDefault();
      if (isElectron() && vehicleModalInstance) {
        renderVehicleList('#modal-vehicle-list-container');
        document.getElementById('modal-search-input').value = '';
        vehicleModalInstance.show();
      } else {
        window.location.href = '../vehiclelist.html';
      }
    }
    if (themeToggleButton) {
      const current = document.body.getAttribute('data-bs-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    }
  });

  // --- Init header/footer then page ---
  function initializePage() {
    Promise.all([
      fetch(getIncludePath('header.html')).then(r => r.text()).then(data => {
        document.getElementById('common-header').outerHTML = data;
        if (navigator.userAgent.toLowerCase().includes(' electron/')) {
          document.querySelectorAll('.electron-only').forEach(btn => btn.style.display = '');
        }
        var btn = document.getElementById('settings-toggle');
        if (btn) {
          btn.addEventListener('click', function(e){
            e.preventDefault();
            const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('settingsModal'));
            modal.show();
            document.getElementById('model-search').value = "";
            if (typeof loadBrandModelsAccordion === 'function') loadBrandModelsAccordion();
          });
        }
      }),
      fetch(getIncludePath('footer.html')).then(r => r.text()).then(data => {
        document.getElementById('common-footer').innerHTML = data;
        document.querySelectorAll('.footer-year').forEach(span => { span.textContent = (new Date()).getFullYear(); });
        if (window.api && typeof window.api.getVersion === 'function') {
          window.api.getVersion().then(function(version){
            var el = document.getElementById('footer-version');
            if (el) el.textContent = 'v' + version;
          });
        }
      })
    ]).then(() => {
      setTheme(localStorage.getItem('theme') || 'dark');

      const params = new URLSearchParams(window.location.search);
      const brandToShow = params.get('brand');
      const viewToShow = params.get('view');

      if (brandToShow && viewToShow === 'models') {
        fetch('../data/brands.json')
          .then(res => res.json())
          .then(brands => {
            const brandData = brands.find(b => b.code.toLowerCase() === brandToShow);
            const brandName = brandData ? brandData.name : brandToShow.charAt(0).toUpperCase() + brandToShow.slice(1);
            loadModels(brandToShow, brandName);
          });
      } else {
        loadBrands();
      }

      window.addEventListener('resize', syncMainHeight);
    });
  }

  initializePage();
});

// App download banner for browser
(function() {
  function isElectron() {
    return navigator.userAgent.toLowerCase().indexOf(' electron/') > -1;
  }
  if (!isElectron() && !localStorage.getItem('hideAppBanner')) {
    var banner = document.getElementById('app-download-banner');
    if (banner) banner.style.display = 'block';
    var closeBtn = document.getElementById('close-app-banner');
    if (closeBtn) {
      closeBtn.onclick = function() {
        banner.style.display = 'none';
        localStorage.setItem('hideAppBanner', '1');
      };
    }
  }
})();
</script>

<script>
const DOWNLOAD_ROOT = "downloads";
const REMOTE_URL = "https://servicevault.xyz/downloads/";

// --- Helpers ---
function fileName(brand, model, type) {
  return `${brand.toLowerCase()}_${model.toLowerCase()}_${type}.zip`;
}

// This function now matches the working version from app-home.html
async function fileExistsLocally(brand, model, type) {
  if (!window.api || !window.api.checkFileExists) return false;
  // Only valid if marker file is present!
  const markerPath = `data/brands/${brand}/${model}/.unzipped_ok`;
  if (!await window.api.checkFileExists(markerPath)) return false;

  if (type === "manuals") {
    const manualFolder = `data/brands/${brand}/${model}/manual`;
    return await window.api.checkFileExists(manualFolder);
  } else if (type === "epc") {
    const sectionsJson = `data/brands/${brand}/${model}/sections.json`;
    const diagramsFolder = `data/brands/${brand}/${model}/diagrams`;
    return (await window.api.checkFileExists(sectionsJson)) || (await window.api.checkFileExists(diagramsFolder));
  }
  return false;
}

async function fileExistsRemotely(brand, model, type) {
  const url = REMOTE_URL + fileName(brand, model, type);
  try {
    const resp = await fetch(url, { method: "HEAD" });
    return resp.ok;
  } catch {
    return false;
  }
}

// --- Download & Progress Logic ---
async function downloadFile(brand, model, type, btn) {
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Downloading...`;
  const zipFile = fileName(brand, model, type);
  const zipPath = `${DOWNLOAD_ROOT}/${zipFile}`;
  const url = REMOTE_URL + zipFile;
  const brandDataFolder = `data/brands/${brand}/`;
  const markerPath = `data/brands/${brand}/${model}/.unzipped_ok`;

  if (window.api && window.api.checkFileExists && window.api.deleteFolder) {
    if (await window.api.checkFileExists(`data/brands/${brand}/${model}/`) &&
        !await window.api.checkFileExists(markerPath)) {
      await window.api.deleteFolder(`data/brands/${brand}/${model}/`);
    }
  }

  let progressHandler;
  if (window.api && window.api.onFileDownloadProgress) {
    progressHandler = data => {
      if (data.dest === zipPath) {
        let speedStr = "";
        if (data.speed && data.speed > 0) {
          if (data.speed > 1024 * 1024)
            speedStr = (data.speed / 1024 / 1024).toFixed(2) + " MB/s";
          else
            speedStr = (data.speed / 1024).toFixed(0) + " KB/s";
        }
        let etaStr = "";
        if (data.eta && data.eta > 0 && isFinite(data.eta)) {
          let sec = Math.round(data.eta);
          etaStr = sec > 90 ? Math.round(sec/60)+" min" : sec+"s";
        }
        btn.innerHTML = `
          <span class="spinner-border spinner-border-sm"></span> 
          Downloading... 
          <span class="text-info">${data.percent}%</span>
          ${speedStr ? ` <span class="text-muted" style="font-size:0.94em;">${speedStr}</span>` : ""}
          ${etaStr ? ` <span class="text-warning" style="font-size:0.94em;">${etaStr} left</span>` : ""}
        `;
      }
    };
    window.api.onFileDownloadProgress(progressHandler);
  }

  try {
    if (window.api && window.api.downloadFile && window.api.unzipFile && window.api.writeFile) {
      await window.api.downloadFile(url, zipPath);
      btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Unzipping...`;
      await window.api.unzipFile(zipPath, brandDataFolder);
      await window.api.writeFile(markerPath, "OK");
      btn.innerHTML = "Redownload";
      btn.classList.remove("btn-outline-primary", "btn-outline-warning");
      btn.classList.add("btn-success");
      btn.disabled = false;
      btn.dataset.action = "download";
    } else {
      window.open(url, "_blank");
      btn.textContent = "Download";
      btn.disabled = false;
    }
  } catch {
    btn.textContent = "Download";
    btn.disabled = false;
    alert("Error downloading or unzipping file. Try again later.");
  }
}

async function openFile(brand, model, type) {
  if (window.api && window.api.openFile) {
    await window.api.openFile(`${DOWNLOAD_ROOT}/${fileName(brand, model, type)}`);
  } else {
    alert("Cannot open file (API not available)");
  }
}

// --- Accordion Render Logic ---
let allBrandsWithModels = [];

// This function now matches the working version
async function loadBrandModelsAccordion(filter = "") {
  const accordion = document.getElementById('brandsAccordion');
  accordion.innerHTML = '<div class="text-center text-secondary py-3">Loading...</div>';
  allBrandsWithModels = [];
  try {
    const brandsResp = await fetch('../data/brands.json');
    let brands = await brandsResp.json();
    brands.sort((a, b) => a.name.localeCompare(b.name));
    for (const brand of brands) {
      const modelsUrl = `../data/brands/${brand.code.toLowerCase()}/models.json`;
      try {
        const modelsResp = await fetch(modelsUrl);
        const modelsData = await modelsResp.json();
        let models = modelsData[brand.code.toLowerCase()] || [];
        models = models.slice().sort((a, b) => a.name.localeCompare(b.name));
        allBrandsWithModels.push({
          brand: brand.code.toLowerCase(),
          brandName: brand.name,
          models: models
        });
      } catch (err) { }
    }
    renderAccordion(filter);
  } catch (err) {
    accordion.innerHTML = '<div class="text-danger text-center py-3">Failed to load brands or models.</div>';
  }
}

function renderAccordion(filter = "") {
  const accordion = document.getElementById('brandsAccordion');
  accordion.innerHTML = "";
  let filteredBrands = allBrandsWithModels.map(b => ({
    ...b,
    models: filter
      ? b.models.filter(m =>
          b.brandName.toLowerCase().includes(filter.toLowerCase()) ||
          m.name.toLowerCase().includes(filter.toLowerCase())
        )
      : b.models
  })).filter(b => b.models.length);

  if (!filteredBrands.length) {
    accordion.innerHTML = '<div class="text-muted text-center py-3">No models found.</div>';
    return;
  }

  filteredBrands.forEach((brand, i) => {
    const card = document.createElement('div');
    card.className = 'accordion-item';
    card.innerHTML = `
      <h2 class="accordion-header" id="heading${i}">
        <button class="accordion-button ${i > 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${i}" aria-expanded="${i === 0 ? 'true' : 'false'}" aria-controls="collapse${i}">
          ${brand.brandName}
        </button>
      </h2>
      <div id="collapse${i}" class="accordion-collapse collapse ${i === 0 ? 'show' : ''}" aria-labelledby="heading${i}" data-bs-parent="#brandsAccordion">
        <div class="accordion-body" style="padding:0;">
          <table class="table table-dark table-striped align-middle mb-0" style="font-size:1.02em;">
            <thead>
              <tr>
                <th style="min-width:160px;">Model</th>
                <th style="min-width:100px;">Manual</th>
                <th style="min-width:100px;">Parts</th>
              </tr>
            </thead>
            <tbody>
              ${brand.models.map(model => `
                <tr>
                  <td>${model.name}</td>
                  <td>
                    ${model.servicemanual
                      ? `<button class="btn btn-sm btn-outline-primary download-btn" data-brand="${brand.brand}" data-model="${model.code.toLowerCase()}" data-type="manual" data-action="download">Download</button>`
                      : '<span class="text-muted">—</span>'}
                  </td>
                  <td>
                    ${model.epc
                      ? `<button class="btn btn-sm btn-outline-warning download-btn" data-brand="${brand.brand}" data-model="${model.code.toLowerCase()}" data-type="epc" data-action="download">Download</button>`
                      : '<span class="text-muted">—</span>'}
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;
    accordion.appendChild(card);

    setTimeout(() => {
      brand.models.forEach(async (model) => {
        if (model.servicemanual) {
          const btn = card.querySelector(`.download-btn[data-model="${model.code.toLowerCase()}"][data-type="manual"]`);
          if (btn) {
            const local = await fileExistsLocally(brand.brand, model.code, "manuals");
            if (local) {
              btn.innerHTML = "Redownload";
              btn.classList.remove("btn-outline-primary", "btn-outline-warning");
              btn.classList.add("btn-success");
              btn.disabled = false;
              btn.dataset.action = "download";
            } else {
              const remote = await fileExistsRemotely(brand.brand, model.code, "manuals");
              if (!remote) {
                btn.textContent = "Not found";
                btn.disabled = true;
              } else {
                btn.disabled = false;
              }
            }
          }
        }
        if (model.epc) {
          const btn = card.querySelector(`.download-btn[data-model="${model.code.toLowerCase()}"][data-type="epc"]`);
          if (btn) {
            const local = await fileExistsLocally(brand.brand, model.code, "epc");
            if (local) {
              btn.innerHTML = "Redownload";
              btn.classList.remove("btn-outline-primary", "btn-outline-warning");
              btn.classList.add("btn-success");
              btn.disabled = false;
              btn.dataset.action = "download";
            } else {
              const remote = await fileExistsRemotely(brand.brand, model.code, "epc");
              if (!remote) {
                btn.textContent = "Not found";
                btn.disabled = true;
              } else {
                btn.disabled = false;
              }
            }
          }
        }
      });
    }, 0);
  });
}

// --- Modal Events ---
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('model-search').addEventListener('input', function() {
    renderAccordion(this.value);
  });
  document.getElementById('clear-model-search').addEventListener('click', function() {
    document.getElementById('model-search').value = "";
    renderAccordion("");
  });
  document.getElementById('brandsAccordion').addEventListener('click', async function(e) {
    if (!e.target.classList.contains('download-btn')) return;
    const btn = e.target;
    const brand = btn.getAttribute('data-brand');
    const model = btn.getAttribute('data-model');
    const type = btn.getAttribute('data-type');
    const action = btn.getAttribute('data-action');
    if (action === "open") {
      await openFile(brand, model, type === "manual" ? "manuals" : "epc");
    } else {
      await downloadFile(brand, model, type === "manual" ? "manuals" : "epc", btn);
    }
  });
});
</script>
